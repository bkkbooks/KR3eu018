body:
  text: 卷三刪補名醫方論三續命湯治中風痱身體不能自收口不能言冒昧不知痛處或拘急不得轉側麻黃桂枝石膏乾薑杏仁四十枚川芎當歸人參甘草各三兩上九味以水一斗煮取四升溫服一升當小汗薄覆脊憑几坐汗出自愈不汗更服無所禁勿當風並治脈伏不得臥咳逆上氣面目浮腫集注趙良曰痱病者營衛氣血不養於內外故身體不用機關不利精神不治然是證有虛有實虛者自飲食房勞七情感之如內經所謂內奪而厥則為喑痱之類是也實者自風寒暑濕感之虛者不可以實治治之則愈散其氣血今此方明言中風痱是屬營衛之實邪也故用續命續命乃麻黃湯之變者加乾薑以開血受寒邪石膏以解肌受風邪當歸和血人參益氣川芎行血散風也其並治咳逆上氣面浮者亦以為風寒所致也三生飲治卒中昏不知人口眼歪斜半身不遂並痰厥氣厥南星生用一兩川烏去皮生用五錢附子去皮生用五錢木香二錢上每服五錢薑水煎加人參一兩集注柯琴曰風為陽邪風中無寒不甚傷人惟風中挾寒害始劇矣寒輕而在表者宜發汗以逐邪寒重而入里者非溫中補虛終不可救此取三物之大辛大熱者且不炮不制更佐以木香乘其至剛至鋭之氣而用之非專以治風兼以治寒也然邪之所湊其氣必虛但知勇於攻邪若正氣虛而不支能無倒戈之患乎必用人參兩許以駕馭其邪此薛己真知確見立於不敗之地而收萬全之效者也若在庸手必謂補住邪氣而不敢用此謹熟陰陽毋與衆謀岐伯所以叮嚀致告耳觀其每服五錢必四服而邪始出今之畏事者用烏附分數必制熟而後敢用更以芩連監製之烏能挽回如是之危證哉古今人不相及信然本方去烏附即星香散治痰厥氣厥足矣稀涎千緡湯治風痰不下喉中聲如牽鋸或中濕腫滿半夏大者十四枚豬牙皂角炙一挺甘草一錢白礬二錢上四味為末用生薑自然汁少許沖溫水一盞調末一錢灌之得吐痰涎即醒集注柯琴曰攻邪有汗吐下三法仲景於吐劑立梔子鼓瓜蒂二方所以導熱邪之上出逐寒邪而外散也其有不因外感因醇酒厚味漸積凝結變為頑痰一旦乘虛上塞咽喉氣不得通忽然昏僕目反直視喉中聲如牽鋸此為痰厥先輩所云怪證多屬於痰者此也非用峻藥以攻之頑痰不能遽退故用生薑半夏之辛以散之甘草之甘以湧之白礬之澀以斂之牙皂之勇以開之此斬關奪門之勢惟稟氣素實而暫虛者可用壅塞稍疏續進他藥不可多用以傷元氣如平素虛弱者又當攻補兼施六君子湯中加牙皂白礬末以吐之則庶幾矣若誤作中風治之去生便遠秦艽升麻湯治風寒客胃口眼喎斜惡見風寒四肢拘急脈浮而緊升麻葛根秦艽白芷防風桂枝甘草人參芍藥蔥白上十味水煎服集注李中梓曰至哉坤元為五臟之主木勝風淫則倉廩之官受制脾主四肢故痿痹也口為土之外候眼為木之為外候故俱病也升麻白芷皆陽明本藥故用為直入之兵桂枝芍藥和其營衛防風秦艽驅散風邪蔥根佐風藥發汗則無微不達又借人參甘草補而和之則大氣周流而邪氣有不散者乎防風黃耆湯治中風不能言脈遲而弱者防風黃耆等分水煎服集注柯琴曰夫風者百病之長也邪風之至急如風雨善治者治皮毛故用防風以驅逐表邪邪之所湊其氣必虛故用黃耆以鼓舞正氣黃耆得防風其功愈大者一攻一補相須相得之義也唐柳太后中風不言許蔭宗造防風黃耆湯數十斤置床下蒸之身在氣中居次日便能語是以外氣通內氣令氣行而愈也經曰五氣入鼻藏於心肺上使耳目修明聲音能彰制此方者其知此義矣夫熏蒸之力尚能去病況服之乎今人治風惟以發散為足法而禁用參耆豈知目盲不能視口噤不能言皆元氣不足使然耳誰知補氣可以御風正勝而邪卻之理耶神而明之存乎其人信哉玉屏風散治風邪久留而不散者自汗不止者亦宜防風黃耆白朮等分上為細末酒調服集注柯琴曰邪之所湊其氣必虛故治風者不患無以驅之而患無以御之不畏風之不去而畏風之復來何則發散太過元府不閉故也昧者不知托裡固表之法遍試風藥以驅之去者自去來者自來邪氣留連終無解期矣防風遍行周身稱治風之仙藥上清頭面七竅內除骨節疼痹外解四肢攣急為風藥中之潤劑治風獨取此味任重功專矣然衛氣者所以溫分肉而充皮膚肥腠理而司開闔惟黃耆能補三焦而實衛為元府御風之關健且元汗能發有汗能止功同桂枝故又能除頭目風熱大風癲疾腸風下血婦人子臟風是補劑中之風藥也所以防風得黃耆其功愈大耳白朮健脾胃溫分肉培土即以寧風也夫以防風之善驅風得黃耆以固表則外有所衛得白朮以固里則內有所據風邪去而不復來此欲散風邪者當依如屏珍如玉也其自汗不止者亦以微邪在表皮毛肌肉之不固耳黃耆五物湯治風靡身無痛半身不遂手足無力不能動履者久久服之自見其功黃耆蜜炙六錢白芍藥酒炒三錢桂枝嫩枝連皮三錢生薑外皮三錢大棗去核四枚水煎服注經曰虛邪偏客於身半其入深者內居營衛營衛衰則真氣去邪氣獨留發為偏枯其邪氣淺者脈偏痛此謂虛邪賊風之中人也營衛虛則其人深久留髮為偏枯半身不遂也營衛實則其人淺即作經脈偏痛風痹病也八風五痹之病營衛實者則以續命湯換骨丹發其營衛之邪風靡偏枯之病是營衛虛則當以此湯補其營衛之虛也故君黃耆以補衛臣桂芍以補營佐薑棗補而兼通以和營衛也此方乃小建中湯之變制加黃耆減甘草飴糖者是其意在補外而不在補中也若左半身不遂則加當歸以補血右半身不遂則倍黃耆以補氣手軟倍桂枝足軟加牛膝筋軟加木瓜骨軟加虎骨元氣虛加人參陽氣虛加附子在臨證者消息之久久服之無不應也如外風邪盛則又當從事乎羌活愈風湯補而散之可也羌活愈風湯治年近四旬營衛不足肝腎虛弱風中經絡精神恍惚語言不清半身不遂手足麻木筋骨無力或手足枯瘦浮腫或手足筋攣不收一切風病稍愈之後調理俱宜此方及初覺大指次指麻木不用手足少力或肌肉微掣口眼跳動若不預防調治三年之內風病必生亦宜服之羌活甘草炙防風黃耆蔓荊子地骨皮川芎細辛枳殼人參麻黃知母甘菊花薄荷枸杞當歸獨活白芷杜仲秦艽柴胡半夏制厚朴薑製熟地黃防己以上各二兩芍藥黃芩白茯苓各三兩石膏生地蒼朮各四兩官桂一兩前胡二兩上每服一兩水二盞煎一盞去滓空心溫服如遇天陰加生薑三片臨臥再煎滓俱要食遠空心服清熱化痰湯治中風痰熱神氣不清舌強難言人參白朮茯苓甘草炙橘紅半夏麥冬石菖蒲枳實木香竹茹黃芩黃連南星水煎加竹瀝薑汁服注中風有內生外中二因內生則因胃濁生痰志極動火外中則因形氣不固感召風邪所以內生者病必痰迷不語火發神昏外中者病必筋骨不用口眼歪斜單發者易治同發者難愈然此病之來必有先兆如大指次指麻木不仁或手足無力或肌肉微掣此營衛受邪外中之先兆也如上盛下虛頭眩腳軟神短忽忽言語失常此痰火將發內生之先兆也醫方中預防外中內生之劑甚多皆不若羌活愈風清熱化痰二方均以補正為主除邪次之故羌活愈風以十全大補湯為君劑清熱化痰以六君子湯為君劑也羌活愈風湯用人參苓草以補氣歸地芍藥以補血黃耆桂枝以扶衛麻黃芎藭以調營濕盛則筋骨痿軟故佐蒼半防己以除之風盛則筋骨拘徑故佐枸杜地黃以滋之病久氣必滯故佐枳殼厚朴以行之風多從燥化故佐知膏黃芩以清之更佐諸羌獨輩發散之品以驅六經之風是風非汗不除也久病風邪之人若一旬無汗須加麻黃微汗以和其表若數日大便不利更加大黃微利以和其里春倍柴胡半夏夏倍知膏黃芩季夏倍防己朮苓秋倍厚朴加桂藿冬倍歸桂加附子此皆通塞從時活變法也一氣一候亦然假如今日風氣大來是風淫也則倍防風熱氣大來是火淫也則借黃芩濕氣大來是濕淫也則倍蒼朮清氣大來是燥淫也則倍桂枝皮寒氣大來是寒淫也則加炮附子此又隨氣候加藥法也清熱化痰湯用參苓朮草以補氣木香枳實以利氣橘半南星以化痰黃芩黃連以瀉熱菖蒲通心麥竹清心薑汁竹瀝通神明去胃濁則內生諸病自漸愈矣氣實減人參白朮者恐助熱也氣虛減木香枳實者恐傷氣也痰熱甚盛大便祕實者此方攻病力緩又當與礞石滾痰丸相兼服之大便利止再服恐過則傷正也若利後數日仍祕實者仍服之是又恐痰熱盛而助邪也其變通加減施治總在臨證者消息之難以盡述防風通聖散風熱壅盛表裡三焦皆實者此方主之防風川芎當歸芍藥大黃薄荷麻黃連翹芒硝各半兩石膏黃芩桔梗各一兩滑石三兩甘草三兩荊芥白朮梔子各二錢半生薑三片每服三錢集注吳琨曰防風麻黃解表藥也風熱之在皮膚者得之由汗而泄荊芥薄荷清上藥也風熱之在顛頂者得之由鼻而泄大黃芒硝通利藥也風熱之在腸胃者得之由後而泄滑石梔子水道藥也風熱之在決瀆者得之由尿而泄風淫於肺肺胃受邪石膏桔梗清肺胃也而連翹黃芩又所以祛諸經之遊火風之為患肝木主之川芎歸芍和肝血也而甘草白朮所以和胃氣而健脾劉守真長於治火此方之旨詳且悉哉亦治失下發斑三焦火實全方除硝黃名雙解散解表有防風麻黃薄荷荊芥川芎解里有石膏滑石黃芩梔子連翹復有當歸芍藥以和血桔梗白朮甘草以調氣營衛皆和表裡俱暢故曰雙解本方名曰通聖極言其用之妙耳九味羌活湯一名沖和湯四時發散之通劑羌活防風川芎白芷細辛蒼朮黃芩甘草生地加生薑三片蔥白三莖水煎服活人敗毒散治傷寒溫疫風濕風眩拘蜷風痰頭痛目眩四肢痛憎寒壯熱項強睛疼老人小兒皆可服羌活獨活前胡柴胡川芎枳殼白茯苓桔梗人參各一兩甘草五錢上為細末每服二錢水一盞入生薑三片煎七分溫服或沸湯點服煩熱口乾加黃芩集注趙羽皇曰東南地土卑濕凡患感冒輒以傷寒二字混稱不知傷者正氣傷於中寒者寒氣客於外未有外感而內不傷者也仲景醫門之聖立法高出千古其言冬時嚴寒萬類深藏君子固密不傷於寒觸冒之者乃名傷寒以失於固密而然可見人之傷寒悉由元氣不固膚腠之不密也昔人常言傷寒為汗病則汗法其首重矣然汗之發也其出自陽其源自陰故陽氣虛則營衛不和而汗不能作陰氣弱則津液枯涸而汗不能滋但攻其外不顧其內可乎表汗無如敗毒散羌活湯其藥如二活二胡芎蒼辛芷群隊辛溫非不發散若無人參生地之大力者居乎其中則形氣素虛者必至亡陽血虛挾熱者必至亡陰而成痼疾矣是敗毒散之人參與沖和湯之生地人謂其補益之法我知其托裡之法蓋補中兼發邪氣不致於流連發中帶補真元不致於耗散施之於東南地卑氣暖之鄉最為相宜此古人制方之義然形氣俱實或內熱熾盛則更當以河間法為是也胡天錫曰非其時而有其氣惟氣血兩虛之人受之寒客營而風客衛不可用峻劑故稍從其輕者此羌活湯敗毒散所由立也九味湯主寒邪傷營故於發表中加芎地引而入血即藉以調榮用蔥薑為引使通體汗出庶三陽血分之邪直達而無所滯矣敗毒散主風邪傷衛故於發表中加參苓枳桔引而達衛固托以宣通用生薑為使使留連肺部則上焦氣分之邪不能幹矣是方亦可用黃芩者以諸藥氣味辛溫恐其僭亢一以潤之一以清之也柴葛解肌湯治三陽合病頭痛發熱心煩不眠嗑干耳聾惡寒無汗三陽證同見者石膏柴胡羌活白芷黃芩芍藥桔梗甘草葛根加薑棗水煎服注陶華制此以代葛根湯不知葛根湯只是太陽陽明藥而此方君柴胡則是又治少陽也用之於太陽陽明合病不合也若用之以治三陽合病表裡邪輕者無不效也仲景於三陽合病用白虎湯主之者因熱甚也曰汗之則譫語遺尿下之則額汗厥逆正示人惟宜以和解立法不可輕於汗下也此方得之葛根白芷解陽明正病之邪羌活解太陽不盡之邪柴胡解少陽初入之邪佐膏芩治諸經熱而專意在清陽明佐芍藥斂諸散藥而不令過汗桔梗載諸藥上行三陽甘草和諸藥通調表里施於病在三陽以意增減未有不愈者也若渴引飲者倍石膏加栝蔞根以清熱而生津也若惡寒甚無汗減石膏黃芩加麻黃春夏重加之以發太陽之寒若有汗者加桂枝以解太陽之風無不可也升麻葛根湯治陽明表熱下利兼治痘疹初發升麻葛根芍藥甘草炙上四味水煎服集注柯琴曰此為陽明初病解表和里之劑可用以散表熱亦可用以治裡虛一方而兩擅其長也夫身熱汗自出不惡寒反惡熱是陽明之本證仲景未嘗立治表之方見陽明初起汗出多而惡寒者便用桂枝湯及無汗而惡寒者則用葛根湯證同太陽而稱陽明者是陽明之表病自太陽傳來故治仍同太陽也此方治陽明自病不用麻桂者恐汗太過而亡津液反致胃燥也用升麻葛根發胃脘之陽以散肌肉之表熱芍藥甘草瀉脾經之火以解胃府之裡熱有汗則發無汗則止功同桂枝而已遠乾薑桂且不須啜稀粥以助陽也胃實為陽明之裡證仲景用承氣三方然陽明初病往往有移熱於脾而下利者內經所謂暴注下迫皆屬於熱也下利正是胃熱之兆故太陽陽明合病必自下利仲景用葛根湯以發兩陽之表熱即所以治裡熱也此方即仿其義去薑桂之辛熱以升麻代麻黃便是陽明表劑而非太陽表劑矣葛根稟性甘涼可以散表實協升麻以上升則使清陽達上而濁陰下降可知芍藥收斂脾陰甘草緩急和里則下利自止可知治里仍用表藥者以表實下利而非裡實故也痘疹自里達表出於少陰而發於太陽初起則內外皆熱故亦宜於涼散耳若無汗加麻黃有汗加桂枝渴熱加石膏咽痛加桔梗頭痛合芎芷散頭面腫合消毒飲有少陽證加柴芩火盛加芩連凡邪在三陽以此出入無不利也參蘇飲治感冒風寒頭痛發熱憎寒咳嗽涕唾稠黏胸膈滿悶脈弱無汗人參八分蘇葉八分乾葛八分前胡八分陳皮八分枳殼八分茯苓八分半夏八分桔梗五分木香五分甘草五分生薑五片大棗一枚上水煎熱服取汗注風寒感冒太陽則傳經以太陽主表故用麻桂二方發營衛之汗也若感太陰則不傳經以太陰主肺故用此湯外散皮毛內宣肺氣也蓋邪之所湊其氣必虛故君人參以補之皮毛者肺之合也肺受風寒皮毛先病故有頭痛無汗發熱憎寒之表以蘇葉葛根前胡為臣以散之肺一受邪胸中化濁故用枳桔二陳以清之則咳嗽涕唾稠黏胸膈滿悶之證除矣加木香以宣諸裡氣加薑棗以調諸表氣斯則表裡之氣和和則解也以本方去人參加川芎以前胡易柴胡名芎蘇飲治氣實有火者頭痛甚亦加之喘嗽者加杏仁以降氣桑皮以瀉肺合四物名茯苓補心湯治氣血兩虛及新産之後虛損吐血感冒傷風咳嗽最相宜也藿香正氣散治外受四時不正之氣內停飲食頭痛寒熱或霍亂吐泄或作瘧疾藿香桔梗紫蘇白芷厚朴大腹皮半夏茯苓陳皮甘草上十味加薑棗水煎熱服集注吳琨曰四時不正之氣由鼻而入不在表而在裡故不用大汗以解表但用芬香利氣之品以正里蘇芷陳腹朴梗皆氣勝者也故能正不正之氣茯半甘草則甘平之品所以培養中氣者也若病在太陽與此湯全無干涉傷寒脈沉發熱與元氣本虛之人並夾陰發熱者宜戒又金不換正氣散即平胃散加半夏藿香凡受山嵐瘴氣及出遠方不服水土吐瀉下利者主之蓋平胃散可以平濕土而消瘴半夏之燥以醒脾藿香之芬以開胃名曰正氣謂能正不正之氣也神術湯主治三時外感寒邪內傷生冷而發熱及脾瀉腸風白朮三錢防風二錢甘草一錢上三味無汗用蒼朮加蔥白生薑有汗用白朮生薑集注柯琴曰此王好古得意之方仿仲景麻桂二方之義而製為輕劑也然此是太陰之劑可以理脾胃之風濕而不可治太陽之風寒亦不可以治陽明之表證與少陽之半表裡也內經所謂春傷於風邪氣留連而洞泄至夏而飧泄腸澼者宜之若冬傷於寒至春而溫病者又非所宜也今人不知仲景立方之旨只恐麻黃桂枝之傷人也得此平和之劑恃為穩當不知營衛不和非調和脾胃者所可代胃家之實者非補虛之品所能投肝膽之相火往來少陰之水火相射者不得以燥劑該攝也失明藥之理始得方之用能知方始可用方而不執方若病在太陽先發陽明之汗是引賊破家張潔古豈獨為葛根道哉麻黃加朮湯治濕家身煩疼麻黃三兩桂枝二兩甘草炙二兩杏仁七十個白朮炒四兩上五味以水九升煮麻黃減二升去沫內諸藥煮取二升半去滓溫服八合覆取微似汗集注程知曰此湯為濕家表散法也身疼為濕身煩為熱加白朮於麻黃湯中一以助其去濕一以恐其過散此治濕之正法也發散方中加白朮又為張潔古王好古二人開法門桂枝附子湯主冶傷寒八九日風濕相搏身體煩疼不能轉側不嘔不渴脈浮虛而澀者桂枝四兩附子炮三枚甘一兩生薑三兩大棗十二枚上五味以水六升煮取二升去滓分溫三服集注程知曰濕與風相搏流入關節身疼極重而無頭痛嘔渴等證脈浮虛者風也澀者寒濕也風在表者散以桂甘之辛甘濕在經者逐以附子之辛熱薑棗辛甘行營衛通津液以和表蓋陽虛則濕不行溫經助陽散濕多藉附子之大力也栝蔞桂枝湯治太陽證備身體強𠘧𠘧然脈反沉遲此為痙此湯主之栝蔞根二兩桂枝三兩芍藥三兩甘草二兩生薑三兩大棗十二枚上六味以水九升煮取三升分溫三服取微汁汗不出食頃須啜熱粥發之集注喻昌曰傷寒方中治項背𠘧𠘧用桂枝加葛根湯矣彼之汗出惡風其邪在表而此之太陽證罔不具備其邪之亦在於表可知也但以脈之沉遲知其在表之邪為津液內竭所召不當從風寒之表法起見故不用葛根之發表解肌改用栝蔞根之味苦入陰擅生津液之長者為君加之桂枝和營衛養筋脈而治其痙乃變表法為和法也然既君以栝蔞根當增之桂枝為臣當減之水解散治天行時氣初起頭痛壯熱等疫大黃四兩白芍二兩黃芩甘草炙桂心麻黃各三兩上為粗末每撮一兩水煎服汗下不再服二聖救苦丹川大黃生一斤皂角豬牙者去皮弦微炒四兩上為末和勻水泛為丸每服三錢無根水下弱者減服注天行時氣即四時不正之氣感而為病者初不名疫也因病氣互相傳染老幼相似沿門闔境而共病之故曰天行時氣也然此疫氣從鼻而入一受其邪臟腑皆病若不急逐病出則多速死急逐之法非汗即下故古人治疫之方以下為主以汗次之是為病尋出路也此二方一以治冬疫一以治春疫冬疫多寒春疫多熱多寒者宜水解散方中用麻桂芍草發營衛之汗大黃黃芩瀉疫毒之邪多熱者宜救苦丹方中用皂角開竅而發表大黃瀉火而攻裡使毒亦從汗下而出也二方審而用之治疫之大法可類推矣天水散一名益無散一名六一散治夏時中暑熱傷元氣內外俱熱無氣以動煩渴欲飲腸胃枯涸者又能催生下乳積聚水蓄裡急後重暴注下迫者宜之桂府滑石水飛六兩甘草一兩辰砂三錢上為細末新汲水一碗調服三錢集注柯琴曰元氣虛而不支者死邪氣盛而無制者亦死今熱傷元氣無氣以動斯時用參耆以補氣則邪愈甚用芩連以清熱則氣更傷惟善攻熱者不使敗人元氣善補虛者不使助人邪氣必得氣味純粹之品以主之滑石稟土中衝和之氣行西方清肅之令秉秋金堅重之形寒能勝熱甘不傷脾含天乙之精而具流走之性異於石膏之凝滯能上清水原下通水道蕩滌六腑之邪熱從小便而泄炙甘草稟草中衝和之性調和內外止渴生津用以為佐保元氣而瀉虛火則五臟自和矣然心為五贓主暑熱擾中神明不安必得硃砂以鎮之則神氣可以虛遽復涼水以滋之則邪熱可以急除此清心之陽熱可通行也至於熱利初起裡急後重者宜之以滑可去著也催生下乳積聚蓄水等證同乎此義故兼治之是方也益氣而不助邪逐邪而不傷氣不負益元之名宜與白虎生脈三方鼎足也香蒂飲治暑熱乘涼飲冷陽氣為陰邪所遏頭痛發熱惡寒煩躁口渴腹滿吐瀉者香薷厚朴薑汁炒白扁豆炒水煎浸冷服集注葉仲堅曰飲與湯稍有別服有定數者名湯時時不拘者名飲飲因渴而設用之於溫暑則最宜者也然胃惡燥脾惡濕多飲傷脾反致下利治之之法心下有水氣者發汗腹中有水氣者利小便然與其有水患而治之曷若先選其能汗能利者用之香薷芳香辛溫能發越陽氣有徹上徹下之功故治暑者君之以解表利小便佐厚朴以除濕扁豆以和中合而用之為飲飲入於胃熱去而濕不留內外之暑悉除矣若心煩口渴者去扁豆加黃連名黃連香薷飲加茯苓甘草名五物加木瓜參耆橘術名十味隨證加減盡香薷之用也然勞倦內傷必用清暑益氣內熱大渴必用人參白虎若用香薷是重虛其表而反濟其內熱矣香薷乃夏月解表之藥如冬月之麻黃氣虛者尤不可服今人不知暑傷元氣概用以代茶是開門揖盜也
