body:
  text: 卷六刪補名醫方論六桂枝湯治風寒在表脈浮弱自汗出頭痛發熱惡風惡寒鼻鳴乾嘔等證及雜證自汗盜汗虛損虛瘧亦可用若脈浮緊汗不出者酒客病風寒而汗出者禁用桂枝三兩芍藥三兩生薑三兩甘草炙二兩大棗十二枚上五味以水七升煮取三升服一升覆令微汗不可令如水流漓病必不除若服一升汗出病痊不必盡劑服已更啜稀粥一盞以助藥力注凡風寒在表脈浮弱自汗出者皆屬表虛宜桂枝湯主之名曰桂枝湯者君以桂枝也桂枝辛溫辛能散邪溫從陽而扶衛芍藥酸寒酸能斂汗寒走陰而益營桂枝君芍藥是於發散中寓斂汗之意芍藥臣桂枝是於固表中有微汗之道焉生薑之辛佐桂枝以解肌表大棗之甘佐芍藥以和營里甘草甘平有安內攘外之能用以調和中氣即以調和表裡且以調和諸藥矣以桂芍之相須薑棗之相得借甘草之調和陽表陰里氣衛血營並行而不悖是剛柔相濟以為和也而精義在服後須臾啜熱稀粥以助藥力蓋穀氣內充不但易為釀汗更使已人之邪不能少留將來之邪不得復入也又妙在溫服令一時許漐漐微似有汗是授人以微汗之法不可令如水流漓病必不除禁人以不可過汗之意也此方為仲景群方之冠乃解肌發汗調和營衛之第一方也凡中風傷寒脈浮弱汗自出而表不解者皆得而主之其他但見一二證即是不必悉具故麻葛青龍發汗諸劑咸用之也若汗不出麻黃證也脈浮緊者麻黃脈也固不可與桂枝湯然初起無汗當用麻黃髮汗如汗解後復煩脈浮數者與下後脈仍浮氣上衝者及下後下利止而身痛不休者皆用此以解外何也蓋此時表雖不解腠理已疏邪不在皮毛而在肌肉且經汗下津液已傷故脈證雖同麻黃而主治當屬桂枝矣粗工妄謂桂枝湯專治中風不治傷寒使人疑而不用又謂專發肌表不治他病不知此湯倍芍藥生薑加人參名桂枝新加湯用以治營表虛寒肢體疼痛倍芍藥加飴糖名小建中湯用以治裡虛心悸腹中急痛再加黃耆名黃耆建中湯用以治虛損虛熱自汗盜汗因知仲景之方可通治百病也麻黃湯治太陽風寒在表頭項強痛發熱身疼腰痛骨節痛惡風寒無汗胸滿面喘其脈浮緊或浮數者用此發汗雖有是證若脈浮而弱汗自出或尺中脈微與遲者俱不可用風寒濕成痹肺經壅塞昏亂不語冷風哮吼最宜麻黃去節三兩桂枝二兩甘草炙一兩杏仁去皮尖六十枚上四味以水九升先煮麻黃減二升去上沫內諸藥煮取二升半去滓溫服八合溫覆取微汗不須啜粥一服汗出停後服汗出多者溫粉撲之注凡風寒在表脈浮緊數無汗者皆表實也宜麻黃湯主之名曰麻黃湯者君以麻黃也麻黃性溫味辛而苦其用在迅升桂枝性溫味辛而甘其能在固表證屬有餘故主以麻黃必勝之算也監以桂枝制節之妙也杏仁之苦溫佐麻黃逐邪而降逆甘草之甘平佐桂枝和內而拒外飲入於胃行氣於元府輸精於皮毛斯毛脈合精溱溱汗出在表之邪必盡去而不留痛止喘平寒熱頓解不須啜粥而藉汗於谷也其不用薑棗者以生薑之性橫散於肌礙麻黃之迅升大棗之性泥滯於膈礙杏仁之速降此欲急於直達稍緩則不迅橫散則不升矣然則為純陽之劑過於發散如單刀直入之將用之若當一戰成功不當則不戢而召禍故可一而不可再如汗後不解便當以桂枝代之此方為仲景開表逐邪發汗第一峻藥也庸工不知其制在溫覆取汗若不溫覆取汗則不峻也世謂麻黃專能發表不治他病不知此湯合桂枝湯名麻桂各半湯用以和太陽留連未盡之寒熱去杏仁加石膏合桂枝湯名桂枝二越婢一湯用以解太陽熱多寒少之寒熱若陽盛於內而無汗者又有麻黃杏仁甘草石膏湯以散太陰肺之邪若陰盛於內而無汗者又有麻黃附子細辛甘草湯以溫散少陰腎家之寒金匱要略以此方去桂枝千金方以此方桂枝易桂皆名還魂湯用以治邪在太陰卒中暴厥口噤氣絶下咽奏效而皆不溫覆取汗是知麻黃湯之峻與不峻而溫覆與不溫覆此仲景用方之心法豈常人所能得而窺耶大青龍湯治太陽風寒兩傷營衛同病傷寒之脈而見中風之證中風之脈而見傷寒之證二證俱不出汗而煩躁者用此兩解發汗雖有是證若脈微弱自汗出者不可服之服必亡陽麻黃去節六兩桂枝二兩杏仁去皮尖四十個甘草炙二兩生薑切三兩大棗擘十二枚石膏碎綿囊如雞子大上七味以水九升先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升取微汗汗出多者溫粉撲之一服汗者停後服汗多亡陽遂虛惡風煩躁不得眠也注何以知風寒兩傷營衛同病以傷寒之脈而見中風之證中風之脈而見傷寒之證也名大青龍湯者取龍興雲雨之義也治風不外乎桂枝治寒不外乎麻黃合桂枝麻黃二湯以成劑故為兼風寒中傷者主之也二證俱無汗故減芍藥不欲其收也二證俱煩躁故加石膏以解其熱也設無煩躁則又當從事於麻黃桂枝各半湯也仲景於表劑中加大寒辛甘之品則知麻黃證之發熱熱全在表大青龍證之煩躁兼肌里矣初病太陽即用石膏者以其辛能解肌熱寒能清胃火甘能生津液是預保陽存津液之先著也粗工疑而畏之當用不用必致熱結陽明斑黃狂冒紛然變出矣觀此則可知石膏乃中風傷寒之要藥得麻桂而有青龍之名得知草而有白虎之號也服後取微汗汗出多者溫粉撲之一服得汗停其後服蓋戒人即當汗之證亦不可過汗也所以仲景桂枝湯中不用麻黃者是欲其不大發汗也麻黃湯中用桂枝者恐其過汗無制也若不慎守其法汗多亡陽變生諸逆表遂空虛而不任風陰盛格陽而更煩躁不得眠也小青龍湯治傷寒表不解心下有水氣乾嘔發熱而咳或渴或利或噎或小便不利少腹滿或喘者及雜病膚脹水腫證用此發汗而利水麻黃去節三兩芍藥三兩五味子半升甘草炙三兩乾薑二兩半夏洗半升桂枝三兩細辛三兩上八味以水一斗先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升若渴者去半夏加括薑根三兩若噎者去麻黃加附子炮一枚若小便不利少腹滿者去麻黃加茯苓四兩若喘者去麻黃加杏仁去皮尖半升若微利者去麻黃加蕘花如雞子熬令赤色按加蕘花如雞子熬令赤色此必傳寫之訛蓋本草蕪花即芫花類也用之攻水其力甚峻五分可令人卞行數十次豈有治停飲之微利而用雞子大之蕘花者乎當改加茯苓四兩注太陽停飲有二一中風表虛有汗五苓散證也一傷寒表實無汗小青龍湯證也表實無汗故合麻桂二方以解外去大棗者以其性泥也去杏仁者以其無喘也有喘者加之去生薑者以有乾薑也若嘔者仍用佐乾薑細辛極溫極散使寒與水俱從汗而解佐半夏逐痰飲以清不盡之飲佐五味收肺氣以斂耗傷之氣若渴者去半夏加花粉避燥以生津也若微利與噎小便不利少腹滿俱去麻黃遠表以就里也加附子以去噎散寒則噎可止加茯苓以利水則微利少腹滿可除矣此方與越婢湯同治水飲溢於表而為膚脹水腫宜發汗外解者元不隨手而消越婢治有熱者故方中君以石膏以散陽水也小青龍治有寒者故方中佐以薑桂以消陰水也葛根湯治太陽陽明兩經合病頭項強痛背亦牽強脈浮元汗惡風者及表不解下利而嘔者並宜服此發汗葛根四兩麻黃去節三兩桂枝二兩芍藥二兩甘草炙二兩生薑切二兩大棗擘十二枚上七味以水一斗先煮麻黃葛根減二升去沫內諸藥煮取三升溫服一升覆取微似汗不須啜粥余如桂枝法將息及禁忌注是方也即桂枝湯加麻黃葛根麻黃佐桂枝發太陽營衛之汗葛根君桂枝解陽明肌表之邪不曰桂枝湯加麻黃葛根而以葛根命名者其意重在陽明以嘔利屬陽明多也二陽表急非溫服覆而取汗其表未易解也或嘔或利里已失和雖啜粥而胃亦不能輸精於皮毛故不須啜粥也柯琴曰此證身不疼腰不疼骨節不疼不惡寒是骨不受寒矣頭項強痛下連於背牽動不寧是筋傷於風矣不喘不煩躁不幹嘔是里不病元汗惡風病只在表若表病而兼下利則是表實裡虛矣比麻黃青龍二證較輕然項強連背拘強更甚於項強無汗不失為表但脈浮不緊故不從乎麻黃而於桂枝方加麻黃倍葛根以去實小變麻桂之法也蓋葛根為陽明主藥凡太陽有陽明者則佐入太陽藥中凡少陽有陽明者則佐入少陽藥中無不可也李杲定為陽明經藥張潔古云未入陽明者不可便服豈二人未讀仲景書乎要知葛根桂枝俱是解肌和里之藥故有汗無汗下利不下利俱可用與麻黃之專於發表者不同也金匱治太陽病無汗小便反少氣上衝胸口噤不得語欲作剛痙集注喻昌曰傷寒項背𠘧𠘧無汗惡風者用葛根湯此證亦用之者以其邪在太陽陽明兩經之界兩經之熱並於胸中必傷肺金清肅之氣故水道不行小便少津液不布而無汗陽明之筋內結胃口外行胸中過人迎環口熱並陽明斯筋脈牽引口噤不得語然剛痙無汗必從汗解況濕邪內郁必以汗出如故而止故用此湯合解兩經之濕熱與風寒之表法無害其同也桂枝麻黃各半湯太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便欲自可一日二三度發脈微緩者為欲愈也脈微而惡寒者此陰陽俱虛不可更發汗更下更吐也面色反有熱色者未欲解也以其不能得小汗出身必癢宜桂枝麻黃各半湯桂枝一兩六銖芍藥一兩麻黃去節一兩生薑一兩甘草炙一兩大棗擘四枚杏仁去皮尖二十四個上七味以水五升先煮麻黃一二沸去上沫內諸藥煮取一升八合去滓溫服六注太陽病得之八九日有如瘧狀之寒熱熱多寒少者其人不嘔小便清白此里和不受邪雖為欲自愈然必審其如瘧狀寒熱一日二三度輕輕而發診其脈微而且緩則知邪衰正復表裡將和始為欲愈也若脈微不緩正未復也更惡寒者邪未衰也雖不能自愈但已為前之汗吐下虛其表裡故不可更發汗更吐更下也脈微惡寒表裡俱虛面色當白今色反赤是猶有表邪怫鬱不能得小汗出宣發陽氣故面赤身癢未欲解也宜桂枝麻黃各半湯小小汗之以和營衛自可愈也桂枝二麻黃一湯服桂枝湯大汗出脈洪大者與桂枝湯如前法若形如瘧日再發者汗出必解宜桂枝二麻黃一湯桂枝一兩十六銖芍藥一兩六銖麻黃去節十六銖甘草一兩二銖杏仁去皮尖十六個生薑一兩六銖大棗擘五枚上七味以水五升先煮麻黃一二沸去上沫內諸藥煮取二升去滓溫服一升日再服注服桂枝湯大汗出脈洪大不解若煩渴者則表邪已入陽明白虎湯證也今脈雖洪大而不煩渴則為表邪無在太陽故與桂枝湯如前法也若脈不洪大壯熱亦減惟寒熱如瘧日再發者雖屬輕邪然終為微寒所持非汗出必不解也宜桂枝二麻黃一湯小發營衛之汗不用麻黃桂枝各半湯者蓋因已大汗出不欲其發營衛汗欲其和營衛汗也桂枝二越婢一湯太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可更汗宜桂枝二越婢一湯桂枝一兩六銖芍藥一兩甘草炙一兩三銖石膏二十四銖麻黃十六銖大棗擘五枚生薑切一兩六銖上七味以水五升煮麻黃一二沸去上沫內諸藥煮取二升去滓溫服一升日再服本方當裁為越婢湯桂枝湯各飲一升今合為一方桂枝二越婢一湯注桂枝二越婢一湯即大青龍以杏仁易芍藥也名雖越婢輔桂枝實則大青龍之變制也去杏仁惡其從陽而辛散用芍藥以其走陰而酸收以此易彼裁而用之則主治不同也以桂枝二主之則不發汗可知越婢一者乃麻黃石膏二物不過取其辛涼之性佐桂枝二中和表而清熱則是寓微汗於不發之中亦可識也非若大青龍以石膏佐麻黃而為發汗驅熱之重劑也桂枝二麻黃一湯治若形如瘧日再發者汗出必解而無熱多寒少故不用石膏之涼也桂枝麻黃各半湯治如瘧狀熱多寒少而不用石膏更倍麻黃者以其面有怫鬱熱色身有皮膚作癢是知熱不向里而向表令得小汗以順其勢故亦不用石膏之涼里也桂枝二越婢一湯治發熱惡寒熱多寒少而用石膏者以其表邪寒少肌裡熱多故用石膏之涼佐麻桂以和營衛非發營衛也今人一見麻桂不問輕重亦不問溫覆不溫覆取汗不取汗總不敢用皆因未究仲景之旨麻桂只是營衛之藥若重劑溫覆取汗則為發營衛之藥輕劑不溫覆取汗則為和營衛之藥也越婢湯治風水惡風一身悉腫脈浮不渴續自汗出無大熱者又治里水一身面目黃腫其脈沉小便不利故令病水假令小便自利此亡津液故令渴也越婢加朮湯主之麻黃六兩石膏半斤生薑切三兩大棗擘十五枚甘草一兩惡風加附子炮一枚上五味以水六升煮麻黃去沫內諸藥煮取三升分三服集注喻昌曰越婢湯者示微發表於不發之方也大率取其通調營衛麻黃石膏二物一甘熱一甘寒合而用之脾偏於陰則和以甘熱胃偏於陽則和以甘寒乃至風熱之陽水寒之陰凡不和於中土者悉得用之何也中土不和則水穀不化其精悍之氣以實營衛營衛虛則或寒或熱之氣皆得壅塞其隧道而不通於表裡所以在表之風水用之而在裡之水兼渴而小便自利者咸必用之無非欲其不害中土耳不害中土自足消患於方萌矣趙良曰五臟各一其陰陽獨脾胃居中而兩屬之故土不獨成四氣土亦從四維而後成不惟火生而已於是四方有水寒之陰即應於脾風熱之陽即應於胃飲食五味之寒熱凡入於脾胃者亦然一有相干則脾氣不和胃氣不清而水穀不化其精微以行營衛以實陰陽也甘者土之本味所以脾氣不和和以甘熱胃氣不清清以甘寒麻黃之甘熱走手足大陰經連於皮膚行氣於三陰以祛陰寒之邪石膏之甘寒走手足陽明經達於肌肉行氣於三陽以祛風熱之邪既用其味甘以入土用其寒熱以和陰陽用其性善走以發越脾氣更以甘草和中緩急二藥相協而成功大棗之甘補脾中之血生薑之辛益胃中之氣惡風者陽虛故加附子以益陽風水者則加朮以散皮膚間風水氣發穀精以宣營衛與麻黃石膏偽使引其入土也越婢之名不亦宜乎按喻昌所論明析趙良之説能細剖其理開悟後學故兩録之麻黃杏仁甘草石膏湯治溫熱內發表裡俱熱頭痛身疼不惡寒反惡熱元汗而喘大煩大渴脈陰陽俱浮者用此發汗而清火若脈浮弱沉緊沉細惡寒自汗出而不渴者禁用麻黃去節四兩杏仁去皮尖五十枚甘草炙二兩石膏碎綿裹半斤上四味以水七升先煮麻黃減二升去上沫內諸藥煮取二升去滓溫服一升集注柯琴曰石膏為清火之重劑青龍白虎皆賴以建功然用之不當適足以召禍故青龍以元汗煩躁得薑桂以宣衛外之陽也白虎以有汗煩渴須粳米以存胃中之液也此但熱無寒故不用薑桂喘不在胃而在肺故不須粳米其意重在存陰不必慮其亡陽也故於麻黃湯去桂枝之監製取麻黃之專開杏仁之降甘草之和倍石膏之大寒除內外之實熱斯溱溱汗出而內外之煩熱與喘悉除矣麻黃附子細辛湯治少陰病始得之反發熱脈沉二三日無里證者麻黃一兩附子炮一枚細辛二兩熱微者以甘草易細辛微發汗上三味以水一斗先煮麻黃減二升去沫內藥煮取三升去滓溫服一升日三服集注柯琴曰少陰主裡應無表證病發於陰應有表寒今少陰始受寒邪而反發熱是有少陰之裡而兼有太陽之表也太陽之表脈應不沉今脈沉者是有太陽之證而見少陰之脈也故身雖熱而脈則沉也所以太陽病而脈反沉便用四逆以急救其里此少陰病而表反熱便於表劑中加附子以預固其里夫發熱無汗太陽之表不得不開沉為在裡少陰之樞又不得不固設用麻黃開腠理細辛散浮熱而無附子以固元陽則少陰之津液越出太陽之微陽外亡去生便遠惟附子與麻黃並用則寒邪雖散而陽不亡此里病及表脈沉而當發汗者與病在表脈浮而發汗者徑庭也若表微熱則受寒亦輕故以甘草易細辛而微發其汗甘以緩之與辛以散之者又少間矣桂枝加附子湯太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者此方主之桂枝湯加附子一枚炮去皮破八片煎服法同不須啜粥集注柯琴曰發汗太過陽無所止息而汗出不止矣汗多亡陽元府不閉風乘虛入故復惡風津液外泄不能潤下故小便難四肢者諸陽之本陽氣者柔則養筋開闔不得風寒從之故筋急而屈伸不利也是方以附於加入桂枝湯中大補表陽也表陽密則漏汗自止惡風自罷矣汗止津回則小便自利四肢自柔矣汗漏不止與大汗出同而從化變病則異服桂枝麻黃後大汗出而大煩渴是陽陷於裡急當救陰故用白虎加人參湯服桂枝麻黃湯大汗出遂漏不止是陽亡於外急當救陽故用桂枝加附子湯要知發汗之劑用桂枝不當則陽陷於裡者多用麻黃不當則陽亡於外者多因桂枝湯有芍藥而無麻黃故雖汗大出而元府尚能自閉多不致亡陽於外耳芍藥甘草附子湯發汗病解反惡寒者虛故也此方主之芍藥三兩甘草炙二兩附子炮去皮破八片一枚上三味以水五升煮取一升五合去滓分溫服集注柯琴曰發汗病解而反惡寒比未汗時更甚其陽虛可知矣夫太陽少陰為表裡太陽之病本由少陰之虛不能藏精而為陽之守也今惡寒反見於發汗病解後是寒邪已從汗解太陽陽虛不能衛外而為陰之使也則陽亡之兆已見於此若無以桂枝湯攻表非以扶陽反以亡陽也故以芍藥收少陰之精氣甘草緩陰邪之上行附子補坎宮之少火但使腎中元陽得位在表之虛陽惡寒自解耳桂枝甘草湯治發汗過多其人叉手自冒心心下悸欲得按者桂枝四兩甘草炙二兩上二味水三升煮取一升頓服集注柯琴曰汗出多則心液虛中氣餒故悸叉手自冒則外有所衛得按則內有所依如此不堪之狀望之而知其虛矣桂枝本營分藥得麻黃則令營氣外發而為汗從辛也得芍藥則收斂營氣而止汗從酸也得甘草則補中氣而養血從甘也故此方以桂枝為君獨任甘草為佐以補陽氣生心液甘溫相得斯氣血和而悸自平不須附子者以汗雖多而未至於陽亡不須芍藥者以汗已止而嫌其陰斂也桂枝加芍藥加大黃湯本太陽病醫反下之因而腹滿時痛者屬太陰也桂枝加芍藥湯主之大實痛者桂枝加大黃湯主之桂枝加芍藥湯方於桂枝湯方內更加芍藥三兩隨前共六兩余依桂枝湯法桂枝加大黃湯方即桂枝加芍藥湯方內更加大黃一兩集注柯琴曰腹滿為大陰陽明俱有之證然位同而職異太陰主出太陰病則腐穢之出不利故滿而時痛陽明主內陽明病則腐穢燥而不行故大實而痛大實痛是陽明病不是太陰病仲景因表證未解陽邪已陷入於太陰故倍芍藥以益脾調中而除腹滿時痛此用陰和陽法也若表邪未解而陽邪陷入於陽明則加大黃以潤胃通結而除其大實痛此雙解表裡法也凡妄下必傷胃氣胃氣虛則陽邪襲陰故轉屬太陰胃液涸則兩陽相搏故轉屬陽明屬大陰則腹滿時痛而下實陰道虛也屬陽明則腹滿大實而痛陽道實也滿而時痛是下利之兆大實而痛是燥屎之徵故倍加芍藥小變建中之劑少加大黃微示調胃之方小建中湯治傷寒表未解或心悸而煩或腹中急痛而脈陽澀陰弦者桂枝三兩芍藥六兩生薑切三兩甘草二兩膠飴一斤大棗擘十二枚上六味以水七升煮取三升去滓內膠飴更上火消解日三服嘔家不可用建中湯以甜故也注是方也即桂枝湯倍芍藥加膠飴名曰小建中謂小小建立中氣以中雖已虛表尚未和不敢大補也故以桂葶湯仍和營衛倍芍藥加膠飴調建中州而不啜稀粥溫服令汗蓋其意重在中虛而不在傷寒之表也中虛建立營衛自和津液可生汗出乃解煩悸可除矣傷寒浮得脈澀營衛不足也沉得脈弦木入土中也營衛不足則表虛木入士中則裡急表虛里急故亦以此湯主治也嘔家不可用謂凡病嘔者不可用恐甜助嘔也炙甘草湯治傷寒脈結代心動悸者又治肺痿咳吐多心中溫溫液液者甘草炙四兩生薑切三兩桂枝三兩麥門冬半升麻子仁半升大棗擘十二枚人參一兩阿膠二兩生地黃一斤上九味以清酒七升水八升先煮八味取三升去滓內膠煬消盡服一升日三服集注柯琴曰仲景於脈弱陰弱者用芍藥以益陰陽虛者用桂枝以通陽甚則加人參以生脈未有用地黃麥冬者豈以傷寒之法義重扶陽乎抑陰無驟補之法歟此以心虛脈結代用生地黃為君麥冬為臣峻補真陰開後學滋陰之路也地黃麥冬味雖甘而氣則寒非發陳蕃莠之品必得人參桂枝以通陽脈生薑大棗以和衛營阿膠補血酸棗安神甘草之緩不使速下清酒之猛捷於上行內外調和悸可寧而脈可復矣酒七升水八升只取三升者久煎之則氣不峻此虛家用酒之法且知地黃麥冬得酒最良此證當用酸棗仁肺痿用麻子仁可也如無真阿膠以龜版膠代之桂枝人參葛根黃芩黃連二湯合論太陽外證未解而數下之遂協熱而利利下不止表裡不解脈微弱心不痞硬者桂枝人參湯主之桂枝證醫反下之利遂不止其脈促喘而汗出者葛根黃連黃芩湯主之枝枝人參湯桂枝四兩甘草四兩人參三兩白朮三兩乾薑三兩水九升先煮四味取五升內桂更煮三升日再服夜一服葛根黃芩黃連湯葛根半斤黃連三兩黃芩三兩甘草炙二兩水八升先煮葛根減二升內諸藥煮二升分溫再服集注柯琴曰外熱不除是表不解下利不止是里不解病因則同一以微弱之脈而心下痞硬是脈不足而證有餘一以脈促而喘反汗自出是脈有餘而證不足表裡虛實當從脈而辨證矣弱脈見於數下後則痞硬為虛故用理中之辛甘溫補止利消痞硬又加桂枝以解表先煮四味後內桂枝和中之力饒而解肌之氣鋭是於兩解中寓權宜法也桂枝證脈本緩誤下後而反促陽氣重可知邪束於表陽擾於內故喘而汗出利遂不止者是暴注下迫屬於熱也故君氣清質輕之葛根以解肌而止利佐苦寒清肅之芩連以止汗而除喘又加甘草以和中先煮葛根後內諸藥解肌之力緩而清中之氣鋭又與補中逐邪者殊法矣又曰上條脈證是陽虛雖協熱於外而里則虛寒下條脈證是陽盛雖下利不止而表裡俱實同一協熱利同是表裡不解而寒熱虛實攻補不同前方理中加桂枝而冠桂枝於人參之上後方瀉心加葛根而冠葛根於芩連之首不名理中瀉心者總為表未解故耳補中亦能解表涼中亦能散表補中亦能散痞涼中亦能止利仲景制兩解方神化如此白虎湯治陽明證汗出渴欲飲水脈洪大浮滑不惡寒反惡熱石膏碎綿裹一斤知母六兩甘草二兩粳米六合上四味以水一斗煮米熟湯成去滓溫服一升日三服集注柯琴曰陽明邪從熱化故不惡寒而惡熱熱蒸外越故熱汗自出熱爍胃中故渴欲飲水邪盛而實故脈滑然猶在經故兼浮也蓋陽明屬胃外主肌肉雖有大熱而未成實終非苦寒之味所能治也石膏辛寒辛能解肌熱寒能勝胃火寒性沉降辛能走外兩擅內外之能故以為君知母苦潤苦以瀉火潤以滋燥故以為臣用甘草粳米調和於中宮且能土中瀉火作甘稼穡寒劑得之緩其寒苦藥得之平其苦使沉降之性皆得留連於味也得二味為佐庶大寒之品無傷損脾胃之慮也煮湯入胃輸脾歸肺水精四布大煩大渴可除矣白虎為西方金神取以名湯秋金得令而炎暑自解矣更加人參以補中益氣而生津協和甘草粳米之補承製石膏知母之寒瀉火而土不傷乃操萬全之術者白虎加人參湯治太陽中熱汗出惡寒身熱而渴者暍是也石膏一斤知母六兩甘草二兩粳米六合人參三兩上五味以水如前煮服法集注趙良曰汗出惡寒身熱而不渴者中風也汗出惡寒身熱而渴者中暍也其證相似獨以渴不渴為辨然傷寒中風皆有背微惡寒與時時惡風而渴者亦以白虎人參湯治之蓋為火爍肺金肺主氣者也肺傷則衛氣虛衛虛則表不足由是汗出身熱惡寒內經曰斛移熱於肺傳為膈消膈消則渴皆相火傷肺所致可知其要在救肺也石膏能治三焦火熱功多於清肺退肺中之火故用為君知母亦就肺中瀉心火滋水之源人參生津益所傷之氣而為臣粳米甘草補土以資金為佐也豬苓湯治陽明病脈浮發熱渴欲飲水少陰病下利六七日咳而嘔渴心煩不得眠者豬苓去皮茯苓阿膠滑石澤瀉各一兩上五味以水四升先煮四味取二升去滓內下阿膠煬消溫服七合日三服集注趙羽皇曰仲景制豬苓一湯以行陽明少陰二經水熱然其旨全在益陰不專利水蓋傷寒表虛最忌亡陽而裡熱又患亡陰亡陰者亡腎中之陰與胃家之津液也故陰虛之人不但大便不可輕動即小水亦忌下通蓋陰虛過於滲利則津液反致耗竭方中阿膠質膏養陰而滋燥滑石性滑去熱而利水佐以二苓之滲瀉既疏濁熱而不留其瘀壅亦潤真陰而不苦其枯燥是利水而不傷陰之善劑也故太陽利水用五苓者以太陽職司寒水故加桂以溫之是暖腎以行水也陽明少陰之用豬苓以二經兩關津液特用阿膠滑石以潤之是滋養無形以行有形也利水雖同寒溫迥別惟明者知之五苓散附茵陳五苓散治脈浮小便不利熱微消渴者發汗已脈浮數煩渴者中風發熱六七日不解而煩有表裡證渴欲飲水水入則吐者茯苓十八銖豬苓十八銖白朮十八株澤瀉一兩桂半兩上五味為散以白飲和服方寸匕日三服多服暖水汗出愈注是方也乃太陽邪熱入腑水氣不化膀胱表裡藥也一治水逆水入則吐一治消渴水入則消夫膀胱者津液之府氣化則能出矣邪熱入之若水盛則水壅不化而水蓄於上膀胱之氣化不行致小便不利也若熱盛則水為熱耗而水消於上膀胱之津液告竭致小便不利也水入吐者是水盛於熱也水入消者是熱盛於水也二證皆小便不利故均得而主之然小便利者不可用恐重傷津液也由此可知五苓散非治水熱之專劑乃治水熱小便不利之主方也君澤瀉之鹹寒咸走水府寒勝熱邪佐二苓之淡滲通調水道下輸膀胱並瀉水熱也用白朮之燥濕健脾助土為之堤防以制水也用桂之辛溫宣通陽氣蒸化三焦以行水也澤瀉得二苓下降利水之功倍小便利而水不蓄矣白朮須桂上升通陽之效捷氣騰津化渴自止也若發熱表不解以桂易桂枝服後多服暖水令汗出愈是此方不止治停水小便不利之裡而猶解停水發熱之表也加人參名春澤湯其意專在助氣化以生津加茵陳名茵陳五苓散治濕熱發黃表裡不實小便不利者無不克也桂枝湯去芍藥加茯苓白朮湯治服桂枝湯或下之無頭項強痛翕翕發熱無汗心下滿微痛小便不利者桂枝去芍藥加茯苓白朮湯主之桂枝去芍藥加茯苓白朮湯方於桂枝湯方內去芍藥加茯苓白朮各三兩余依桂枝湯法煎服小便利則愈注服桂枝湯已汗也或下之已下也今無有頭項強痛翕翕發熱無汗之表心下滿微痛小便不利停飲之裡無汗表不解心下有水氣當用小青龍汗之今無汗表不解有水氣心下滿微痛小便不利而不用小青龍者以其已經汗下表裡俱虛也故仍用桂枝湯以解表去芍藥之酸收避無汗心下之滿加茯苓之燥滲因水停小便不利也余依桂枝湯法煎服謂依桂枝湯法取汗也小便利則愈謂飲病輸水道則愈也此方即桂苓甘術湯而有生薑大棗其意專在解肌利水次之故用生薑大棗佐桂枝以通津液取汗也桂苓甘術湯不用生薑大棗而加茯苓其意專在利水扶陽次之故倍加茯苓君桂枝於利水中扶陽也故方後不曰依服桂枝湯方也十棗湯治太陽中風表解漐漐汗出而不惡寒里有水氣小便不利嘔逆短氣心下至脅痞滿硬痛者此治水之急方也大棗擘十枚甘遂大戟芫花熬各等分上三味各別搗為散以水一升半先煮大棗肥者十枚取八合去滓內藥末強人一錢羸人服半錢平旦溫服若下少病不除者明日再服加半錢得快下後糜粥自養集注柯琴曰仲景治水之方種種不同此其最峻者也凡水氣為患或喘或咳或悸或噎或吐或利病在一處而止此則水邪留結於中心腹脅下痞滿硬痛三焦升降之氣阻隔難通此時表邪已罷非汗散之法所宜里飲實盛又非淡滲之品所能勝非選逐水至峻之品以折之則中氣不支束手待斃矣甘遂芫花大戟三味皆辛苦氣寒而稟性最毒並舉而用之氣味相濟相須故可夾攻水邪之巢穴決其瀆而大下之一舉而患可平也然邪之所湊其氣必虛以毒藥香邪必傷及脾胃使元沖和甘緩之品為主宰則邪氣盡而大命亦隨之矣然此藥最毒參朮所不能君甘草又與之相反故選十棗之大而肥者以君之一以顧其脾胃一以緩其峻毒得快利後糜粥自養一以使穀氣內充一以使邪不復作此仲景用毒攻病之法盡美又盡善也昧者惑於甘能中滿之説而不敢用豈知承製之理乎
