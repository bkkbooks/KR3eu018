body:
  text: 卷四刪補名醫方論四黃連解毒湯治一切陽熱火盛面赤口乾狂燥心煩錯語不眠大熱乾嘔吐血衄皿及下後而便不實熱仍不已者黃連梔子各等分黃柏黃芩水煎服集註汪昂曰寒極曰陰毒熱極曰陽毒是方名曰黃連解毒是君以黃連直解心經火毒也黃芩瀉肺經火毒黃瀉腎經火毒梔子通瀉三焦火毒使諸火毒從膀肌出若大便實者加大黃名梔子金花湯利大便是使火毒從大小二便而出也蓋陽盛則陰衰火盛則水衰故用大苦大寒之藥抑陽而扶陰瀉其亢甚之火而救其欲絕之水也然非實熱不可輕投按黃連解毒湯白虎湯三黃石膏湯大青龍湯皆治表裡俱熱證然大青龍湯治表實壯熱裡熱之淺在肌三黃石膏湯治表實壯熱裡熱之深在胃故一以石膏佐麻桂一以石膏佐麻豉均發太陽之表解陽明之裡也大青龍湯則更以杏草薑棗佐麻黃其意專發熱郁之在肌也三黃石膏湯則更以芩連梔柏佐石膏其意專瀉熱深之在胃也白虎湯治表熱在肌裡熱在胃所以不用麻桂以發太陽專主石膏而清陽明也解毒湯治表熱在三陽裡熱在三焦所以亦不以麻桂發太陽表亦不以石膏清陽明裡而專以三黃瀉上下內外之實火也此皆太陽之邪侵及陽明而未入腑成實者也若已入腑成實則又當從事乎三承氣湯以下其熱也三黃湯治三焦實熱一切有餘火證大便秘結者黃芩大黃各等分黃連水煎服二黃湯治上焦火旺頭面大腫目赤腫痛心胸咽喉口舌耳鼻熱盛及生瘡毒者黃芩黃連甘草各等分水煎食後服按三黃湯用黃芩瀉上焦火黃連瀉中焦火大黃瀉下焦火三焦實火大便實者誠為允當若大便不實者黃連解毒湯證也以大黃易黃柏者因其下焦熱結未實也加梔子者使其熱不從大便出而從小便出也上中二焦實火用涼膈散若夫上焦實火則以此湯之大黃易甘草名二黃湯使芩連之性緩緩而下留連膈上張潔古以涼膈散減硝黃加桔梗亦此義也雖同一瀉火之劑而其中上下緩急輕重之不同此皆加減轉換法也不可不知三黃石青湯治傷寒陽證表裡大熱而不得汗或已經汗下過經不解六脈洪數面赤鼻乾舌燥大渴煩躁不眠譫語鼻衄發黃發疹發斑以上諸證凡表實無汗而未入里成實者均宜主之石膏兩半黃芩黃連黃柏麻黃以上各七錢淡豆豉二合梔子三十個每服一兩加蔥三根水煎熱服氣實者倍服注仲景於表裡大熱立兩解之法如大青龍湯治表裡大熱表實無汗故發汗汗出而兩得解也白虎湯治表裡大熱因表有汗不主麻桂因里未實不主硝黃惟以膏知甘草外解陽明之肌熱內清陽明之腑熱表裡清而兩得解也若夫表實無汗熱鬱營衛里未成實熱盛三焦表裡大熱之證若以大青龍湯兩解之則功不及於三焦若以白虎湯兩解之則效不及於營衛故陶華制此湯以三黃瀉三焦之火盛佐梔子屈曲下行使其在裡諸熱從下而出以麻黃開營衛之熱鬱佐豉蔥直走皮毛使其在表之邪從外而散石膏倍用重任之者以石膏外合麻豉取法乎青龍是知解諸表之熱不能外乎青龍也內合三黃取法乎白虎是知解諸里之熱不能外乎白虎也且麻豉得石膏三黃大發表熱而不動裡熱三黃得石膏麻豉大清內熱而不礙外邪是此方擅表裡俱熱之長亦得仲景之心法者也若表有微汗麻黃減半桂枝倍加以防外疏里有微溏則減去石膏倍加葛根以避中虛也涼膈散治心火上盛中焦燥實煩躁口渴目赤頭眩口瘡唇裂吐血衄血大小便秘諸風瘛瘲胃熱發斑發狂及小兒驚急痘瘡黑陷連翹四兩大黃酒浸黃芩酒炒薄荷一兩甘草二兩梔子炒芒硝上為末每服三錢加竹葉生蜜煎集註汪昂曰此上中二焦瀉實火藥也熱淫於內治以鹹寒佐以苦甘故以連翹黃芩竹葉薄荷散火於上而以大黃芒硝之猛利蕩熱於中使上升下行而膈自清矣用甘草生蜜者病在膈甘以緩之也古方用涼膈散居多本方加菖蒲遠志名轉舌膏治心經蘊熱加青黛藍根名活命金丹治肝經風熱張潔古減去硝黃加桔梗為之舟楫浮而上行治上焦諸熱便不實者宜之不可以此方過瀉而輕訾之也竹葉黃耆湯治消渴氣血虛胃火盛而作渴淡竹葉生地黃各二錢黃耆麥冬當歸川芎黃芩甘草芍藥人參半夏石膏各一錢上水煎服集註柯琴曰氣血皆虛胃火獨盛善治者補瀉兼施寒之而不至損陽溫之而至助火扶正而邪卻矣四君子氣藥也加黃耆而去苓術者恐火就燥也四物湯血藥也倍地黃而用生者正取其寒也人參黃耆甘草治煩熱之聖藥是補中有瀉矣且地黃之甘寒瀉心腎之火竹葉助芍藥清肝膽之火石膏佐芍藥清脾胃之火麥冬同黃芩清肺腸之火則胃火不得獨盛而氣血之得補可知惟半夏一味溫中辛散用之大寒劑中欲其通陰陽之路也岐伯治陰虛而目不瞑者飲以半夏湯覆杯則臥今人以為燥而渴者禁用是不明陰陽之理耳按是方即竹葉石膏湯加生地當歸白芍川芎黃耆黃芩也彼則治傷寒解後煩渴少氣氣逆欲吐此則治消渴氣血虛胃火盛因其氣虛故加黃耆佐人參甘草以補氣因其血虛故加歸芎芍地以補血因其胃火盛故加黃芩佐石膏以清胃火其煩渴則一故余藥皆同也於此二方推之用半夏之意自可知矣故脾者為胃行其津液也脾濕胃燥津液不行得火則化痰得寒則成飲胃火清脾濕燥其痰飲自除矣半夏消痰破飲使未化痰之津液回清而已成痰之濁液自化非他藥所可比倫也故二方於胃火盛燥渴中同用之清胃散治胃經濕熱齒齦腫痛或牽引頭腦或面發熱升麻甘草生地黃川黃連牡丹皮當歸水煎服集註羅謙甫曰陽明胃多氣多血又兩陽合明為熱盛是以邪入而為病常實若大渴舌苔煩躁此傷氣分熱聚胃府燥其津液白虎湯主之若醇飲肥厚炙爆過用以致濕熱壅於胃府逆於經絡而為是病此傷血分治宜清胃方中以生地益陰涼血為君佐之以丹皮去蒸而疏其滯以黃連清熱燥濕為臣佐之以當歸入血而循其經仍用升麻之辛涼為本經捷使引諸藥直達血所則咽喉不清齒齦腫痛等證廓然俱清矣導赤散治心熱口糜舌瘡小便黃赤莖中作痛熱淋不利生地木通甘草梢上三味水煎服注赤色屬心導赤者導心經之熱從小腸而出以心與小腸為表裡也然所見口糜舌瘡小便黃赤莖中作痛熱淋不利等證皆心熱移於小腸之證故不用黃連直瀉其心而用生地滋腎涼心木通通利小腸佐以甘草梢取易瀉最下之熱莖中之痛可除心經之熱可導也此則水虛火不實者宜之以利水而不傷陰瀉火而不伐胃也若心經實熱須加黃連竹葉甚者更加大黃亦釜底抽薪之法也五淋散治膀胱結熱水道不通淋澀熱痛或尿如豆汁或成砂石或如膏膿或小便血赤苓一錢五分赤芍一錢梔仁一錢當歸甘草各錢二分上五味加燈心水煎服八正散瞿麥梔子扁蓄大黃木通滑石車前子甘草各一錢加燈心一錢煎服朱震亨方加木香一錢注通調水道下輸膀胱三焦之職也受藏津液氣化能出膀胱之職也若水道不輸則內蓄喘脹外泛膚腫三焦之病也若受藏不化則諸淋澀痛癃閉不通膀胱之病也經曰陰無陽元以生陽無陰無以化故陰陽偏盛皆不生化也陽盛陰虛而膀胱之氣不化為病者通關丸證也陰盛陽虛而膀胱之氣不化為病者腎氣丸證也此關乎氣化陰陽之為病也經曰下虛則遺尿又曰膀胱不約為遺尿經曰胞移熱於膀胱則癃又曰膀胱不利為癃故虛而寒者藏而不能約實而熱者約而不能出也膀胱氣虛無氣以固則藏而不約不禁遺失之病生補中固真湯證也膀胱氣熱壅結不行則約而不出淋澀癃閉之病生八正五淋散證也此不全關乎氣化而又關乎虛寒實熱之為病也八正五淋皆治淋澀癃閉之藥而不無輕重之別輕者有熱未結雖見淋澀尿赤豆汁砂石膏血癃閉之證但其痛則輕其病不急宜用五淋散單清水道故以梔苓清熱而輸水歸芍益陰而化陽復佐以甘草調其陰陽而用梢者意在前陰也重者熱已結實不但痛甚勢急而且大便亦不通矣宜用八正散兼瀉二陰故於群走前陰藥中加大黃直攻後竅也丹溪方加木香者其意亦以氣化者歟逍遙散治肝家血虛火旺頭痛目眩煩赤口苦倦怠煩渴抑鬱不樂兩脅作痛寒熱小腹重墜婦人經水不調脈弦大而虛芍藥酒炒當歸白朮炒茯苓甘草炙柴胡各二錢引用煨姜三片薄菏少許煎服加味逍遙散即此方加丹皮山梔炒各五分集註趙羽皇曰五臟苦欲補瀉云肝苦急急食甘以緩之蓋肝性急善怒其氣上行則順下行則鬱鬱則火動而諸病生矣故發於上則頭眩耳鳴而或為目赤發於中則胸滿脅痛而或作吞酸發於下則少腹疼疝而或溲尿不利發於外則寒熱往來似瘧非瘧凡此諸證何莫非肝鬱之象乎而肝木之所以郁其說有二一為土虛不能升木也一為血少不能養肝也蓋肝為木氣全賴土以滋培水以灌溉若中土虛則木不升而鬱陰血少則肝不滋而枯方用白朮茯苓者助土德以升木也當歸芍藥者益榮血以養肝也薄荷解熱甘草和中獨柴胡一味一以為厥陰之報使一以升發諸陽經云木鬱則達之遂其曲直之性故名曰逍遙若內熱外熱盛者加丹皮解肌熱炒梔清內熱此加味逍遙散之義也龍膽瀉肝湯治脅痛口苦耳聾耳腫筋痿陰濕熱癢陰腫白濁溲血龍膽草酒炒黃芩炒梔子酒炒澤瀉木通車前子當歸酒洗柴胡甘草生地酒炒水煎服注脅痛口苦耳聾耳腫乃膽經之為病也筋痿陰濕熱癢陰腫白濁溲血乃肝經之為病也故用龍膽草瀉肝膽之火以柴胡為肝使以甘草緩肝急佐以芩梔通澤車前輩大利前陰使諸濕熱有所從出也然皆瀉肝之品若使病盡去恐肝亦傷矣故又加當歸生地補血以養肝蓋肝為藏血之臟補血即所以補肝也而妙在瀉肝之劑反作補肝之藥寓有戰勝撫綏之義矣左金丸治肝臟火實左脅作痛黃連炒六兩吳茱萸湯泡一兩上為末作丸集註胡天錫曰此瀉肝火之正劑肝之治有數種水衰而木無以生地黃丸乙癸同源是也土衰而木無以植參苓甘草劑緩肝培土是也本經血虛有火用逍遙散清火血虛無水用四物湯養陰至於補火之法亦下同乎腎而瀉火之治則上類乎心左金丸獨用黃連為君從實則瀉子之法以直折其上炎之勢吳茱萸從類相求引熱下行並以辛燥開其肝鬱懲其捍格故以為佐然必本氣實而土不虛者庶可相宜左金者木從左而制從金也瀉青丸治肝火風熱不能安臥多驚多怒目赤腫痛及小兒急驚抽搐龍膽草山梔大黃酒蒸川芎當歸羌活防風等分蜜丸竹葉湯下注龍膽草直入肝經以瀉其火佐梔子大黃使其所瀉之火從大小二便而出是治火之標也肝主風風能生火治肝不治風非其治也故用羌活防風散肝之風即所以散肝之火是治火之本也肝之情欲散故用川芎之辛以散之肝之質喜滋故用當歸之濡以潤之是於瀉肝之中寓有養肝之意瀉肝者瀉肝之病也養肝者悅肝之神也蓋肝木主春乃陽升發動之始萬物生化之源不可傷也當歸龍薈丸治肝經實火頭運目眩耳聾耳鳴驚悸搐溺躁擾狂越大便秘結小便澀滯或胸脅作痛陰囊腫脹凡屬肝經實火皆宜服之當歸一兩黃連一兩黃芩一兩龍膽草一兩梔子仁一兩大黃五錢蘆薈五錢青黛五錢木香二錢五分黃柏一兩麝香另研五錢上為末炒神麯糊丸每服二十丸薑湯下集註汪昂曰肝木為生火之本肝火盛則諸經之火相因而起為病不止一端矣故以當歸蘆薈龍膽草青黛直入本經氣血兩途先平其甚者而諸經之火無不漸平矣佐以黃芩瀉肺火黃連瀉心火黃柏瀉腎火大黃瀉腸胃火梔子瀉三焦火備舉大苦大寒而直折之使上中下三焦之火悉從大小二便利出少加木香麝香者取其調氣開竅靈通周至也然非實火不可輕投越婢加半夏湯治咳而上氣此為肺脹其人喘目如脫狀脈浮大者麻黃六兩石膏半斤生薑三兩甘草二兩半夏半升大棗十五枚上六味以水六升先煮麻黃去沫內藥取三升分溫三服小青龍加石青湯治肺脹咳而上氣煩躁而喘脈浮者心下有水氣麻黃三兩桂枝三兩細辛三兩芍藥三兩半夏半升石膏三兩乾薑三兩五味子半升甘草三兩上九味以水一斗煮麻黃去沫內諸藥取三升強人服一升羸者減之日三服小兒服四合集註喻昌曰前一方麻黃湯中以桂杏易石膏以脈大有熱而加薑棗則發散之力微而且緩也後一方小青龍湯中加入石膏以證兼煩躁雖宜汗散寒飲猶防助熱傷津也越婢方中有石膏半夏二物協力建功石膏清熱藉辛熱亦能豁痰半夏豁痰借辛涼亦能清熱前麥冬湯方中下氣止逆全藉半夏入生津藥中此二方又藉半夏入清溫劑中仲景加減成方無非化裁後學矣清燥救肺湯治諸氣膹郁諸痿喘嘔桑葉經霜者三錢石膏炒二錢五分甘草一錢胡麻仁炒研一錢真阿膠八分人參七分麥冬一錢二分杏仁去皮尖炒黃七分枇杷葉去毛蜜炙一片上九味以水一碗煎六分頻頻二三次滾熱服痰多加貝母栝蔞血枯加生地熱甚加犀角羚羊角或加牛黃集註喻昌曰按諸氣膹郁之屬於肺者屬於肺之燥也而古今治氣鬱之方用辛香行氣絕無一方治肺之燥者諸痿喘嘔之屬於上者亦屬於肺之燥也而古今治法以痿嘔屬陽明以喘屬肺是則嘔與痿屬之中下而惟喘屬上矣所以亦無一方及於肺之燥也即喘之屬於肺者非表即下非行氣即泄氣間有一二用潤劑者又不得其肯綮今擬此方名清燥救肺大約以胃為主胃土為肺金之母也其天冬知母能清金滋水以苦寒而不用至如苦寒降火之藥尤在所忌蓋肺金自至於燥所存陰氣不過一線耳倘更以苦寒下其氣傷其胃其人尚有生理乎誠仿此增減以救肺燥變生諸證庶克有濟柯琴曰古方用香燥之品以治氣鬱不獲奏效者以火就燥也惟繆仲醇知之故用甘涼滋潤之品以清金保肺立法喻昌宗其旨集諸潤劑而制清燥救肺湯用意深取藥當無遺蘊矣按經云損其肺者益其氣肺主諸氣故也然火與元氣不兩立故用人參甘草甘溫而補氣氣壯火自消是用少火生氣之法也若夫火燥膹鬱於肺非佐甘寒多液之品不足以滋肺燥而肺氣反為壯火所食益助其燥矣故佐以石膏麥冬桑葉阿膠胡麻仁輩使清肅令行而壯火亦從氣化也經曰肺苦氣上逆急食苦以降之故又佐以杏仁枇杷葉之苦以降氣氣降火亦降而制節有權氣行則不郁諸痿喘嘔自除矣要知諸膹郁則肺氣必大虛若泥於肺熱傷肺之說而不用人參郁必不開而火愈熾皮聚毛落喘咳不休而死矣此名之救肺涼而能補之謂也若謂實火可瀉而久服芩連苦從火化亡可立待耳麥門冬湯火逆上氣咽喉不利止逆下氣者主之麥門冬七升半夏一升人參三兩甘草二兩粳米三合大棗十二枚上六味以水一斗二升煮取六升溫服一升日三服夜一服集註喻昌曰此方治胃中津液乾枯虛火上炎治本之良法也夫用降火之藥而火反升用寒涼之藥而熱轉熾者徒知與火熱相爭弗知補正氣以生津液不惟無益而反害之矣凡肺病有胃氣則生無胃氣則死胃氣者肺之母氣也本草有知母之名謂肺藉其清涼知清涼為肺之母也又有貝母之名謂肺藉其豁痰豁痰為肺之母也然屢施於火逆上氣咽喉不利之證而屢不應者名不稱矣孰知仲景妙法於麥冬人參甘草大棗粳米大補中氣以生津液隊中又增入半夏辛溫之味以開胃行津而潤肺豈特用其利嚥下氣哉顧其利嚥下氣非半夏之功實善用半夏之功也人參清肺湯治肺胃虛寒咳嗽喘急坐臥不安並治久年勞嗽吐血腥臭人參阿膠骨皮知母烏梅粟殼炙草杏仁桑皮各等分加棗子煎服人參定喘湯人參麻黃阿膠五味粟殼甘草半夏曲各一錢桑皮二錢生薑三片水煎服人參瀉肺湯治肺經積熱上喘胸隔脹滿痰多大便澀人參黃芩梔子枳殼薄荷甘草連翹杏仁桑皮大黃桔梗水煎服集註王又原曰經云邪之所湊其氣必虛又肺為嬌臟其不堪破耗也明矣自肺熱傷肺之說行曰保肺補肺眾共譁之曰清肺瀉肺藥與和之豈知古人清肺瀉肺等湯而必皆以人參立名夫亦可曉然於肺氣之不可耗而人參之在所必用也肺體清而法天下濟而司降令一切渾濁不得上乾者皆胸中之氣健運行而不息也若肺氣少弛則降下失令渾濁之氣遂逆上行此為咳嗽為喘急肺葉脹舉胸膈緊痛移熱大腸大便艱澀種種顯有餘之象實種種為不足之徵故不問內傷外感為熱為寒要以人參保定肺氣為主或佐骨皮知母阿膠滋之烏梅五味罌粟殼斂之半夏曲生薑降之杏仁桑皮枳殼桔梗利之梔子黃芩連翹涼之麻黃薄荷發之大黃下之總恃人參之大力握樞而運已入之邪易出而將來之邪無從入也肺邪得諸藥以俱出而肺氣不隨諸藥以俱出也然則人參亦何嘗傷肺乃畏而不敢用耶又謂風寒咳嗽忌用五味子嗽用粟殼止嗽如神切肺如刀然此無本之言不知始自何出皆因不讀本草不知藥之性味功能以訛傳訛也近世之醫亦不能辨惟識者察之瀉白散治肺氣鬱熱咳嗽而喘面腫身熱桑白皮地骨皮甘草水煎服集註季楚重曰經云肺苦氣上逆上逆則上焦鬱熱氣鬱生涎火鬱生熱因而制節不行壅甚為喘滿腫嗽白者肺之色瀉白瀉肺氣之有餘也君以桑白皮質液而味辛液以潤燥辛以瀉肺臣以地骨皮質輕而性寒輕以去實寒以勝熱甘草生用瀉火佐桑皮地骨皮瀉諸肺實使金清氣肅而喘嗽可平較之黃芩知母苦寒傷胃者遠矣夫火熱傷氣救肺之治有三實熱傷肺用白虎湯以治其標虛火刑金用生脈散以治其本若夫正氣不傷鬱火又甚則瀉白散之清肺調中標本兼治又補二方之不及也阿膠散治肺虛有火嗽無津液咳而硬氣者真阿膠一兩牛蒡子炒二錢半馬兜鈴炒五錢杏仁七錢炙甘草五錢糯米一合每服兩許水煎服集註程應旄曰痰帶紅線嗽有血點日漸成痿緣肺處臟之最高葉間布有細竅氣從此出入呼吸成液灌溉周身所謂水出高源也一受火炎吸時徒引火升呼時並無液出久則肺竅俱閉喉間或癢或瘡六葉遂日焦枯矣今用阿膠為君者消竅瘀也用杏仁大力子宣竅道也馬兜鈴者清竅熱也糯米以補脾母氣到則肺自輕清無礙矣二陳湯治肥盛之人濕痰為患喘嗽脹滿半夏制三錢茯苓三錢陳皮去白二錢甘草一錢上四味加姜三片水煎服集註李中梓曰肥人多濕濕挾熱而生痰火載氣而逆上半夏之辛利二便而去濕陳皮之辛通三焦而理氣茯苓佐半夏共成燥濕之功甘草佐陳皮同致調和之力成無己曰半夏行水氣而潤腎燥經曰辛以潤之是也行水則土自燥非半夏之性燥也或曰有痰而渴宜去半夏代以貝母吳琨曰渴而喜飲小便利者易之不能飲水小便不利雖渴宜半夏也此濕為本熱為標所謂濕極而兼勝已之化非真象也又東南之人濕熱生痰故朱震亨主之加枳實砂仁名枳實二陳湯其性較急也先哲云二陳為治痰之妙劑其於上下左右無所不宜然只能治實痰之標不能治虛痰之本虛痰之本在脾胃治者詳之溫膽湯治熱嘔吐苦虛煩驚悸不眠痰氣上逆竹茹枳實半夏甘草陳皮茯苓生薑上七味水煎服集註羅謙甫曰膽為中正之官清靜之府喜寧謐惡煩擾喜柔和惡壅鬱蓋東方木德少陽溫和之氣也若病後或久病而宿有痰飲未消胸膈之餘熱未盡必致傷少陽之和氣以故虛煩驚悸者中正之官以熇蒸而不寧也熱嘔吐苦者清靜之府以郁炙而不謐也痰氣上逆者木家挾熱而上升也方以二陳治一切痰飲加竹茹以清熱加生薑以止嘔加枳實以破逆相濟相須雖不治膽而膽自和蓋所謂膽之痰熱去故也命名溫者乃謂溫和之溫非謂溫涼之溫也若謂膽家真畏寒而怯而溫之不但方中無溫膽之品且更有涼胃之藥也小半夏湯嘔家本渴渴為欲解今反不渴心下有支飲故也半夏一升生薑半斤以水七升煮取一升半分溫再服小半夏加茯苓湯治卒嘔吐心下痞膈間有水眩悸者半夏一升生薑半斤茯苓三兩煎服如前外臺茯苓飲治心胸中有痰飲宿水自吐出水復心胸間虛氣滿不能食消痰氣令能食茯苓三兩人參三兩白朮三兩枳實二兩橘皮二兩半生薑四兩上六味水六升煮取一升八合分三服如人行八九里再進之集註趙良曰嘔為痰飲動中湧而出之嘔盡本當渴渴則可徵支飲之全去今反不渴是其飲尚留去之未盡也用半夏之辛溫生薑之辛散散其欲出之飲則所留之邪自盡矣半夏生薑皆味辛可治膈上痰心下堅嘔逆目眩然悸必心受水凌故加茯苓以去水伐腎邪安心神也後方加人參枳實橘皮此由上中二焦氣弱水飲入胃脾不能輸歸於肺肺不能通調水道以致停積為痰為宿水吐之則下氣因而上逆虛與氣結滿不能食當補益中氣以人參白朮為君茯苓逐宿水枳實破諸氣為臣開脾胃宣揚上焦發散凝滯則陳皮生薑為使也其積飲既去而虛氣塞滿其中不能進食此證最多
