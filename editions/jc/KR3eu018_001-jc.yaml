body:
  text: 卷一刪補名醫方論一古醫方得人乃傳非人勿言故扁鵲倉公皆稱禁方不輕授人誠重之也後漢張機著傷寒雜病論始立眾方公之天下故建安以前苦於無方元豐而後雖有局方漫無指歸不可為法今博集金匾千金外臺諸書及王好古李杲劉完素朱震亨張從政薛己諸方之佳者採錄成編然方論始於成無己近代則有吳琨李中梓柯琴汪昂諸家於醫方雖各有發明但其問或有擇焉未精語焉未詳者復推其立方之意綜其簡要刪繁補缺歸於明顯名之曰刪補名醫方論以昭示來茲云獨參湯治元氣大虛昏厥脈微欲絕及婦人崩產脫血血暈人參分兩隨人隨證須上揀者濃煎頓服待元氣漸回隨證加減集註柯琴曰一人而系一世之安危者必重其權而專任之一物而系一人之死生者當大其服而獨用之故先哲於氣幾息血將脫之證獨用人參二兩濃煎頓服能挽回性命於瞬息之間非他物所可代也世之用者恐或補住邪氣姑少少以試之或加消耗之味以監製之其權不重力不專人何賴以得生乎如古方霹靂散大補丸皆用一物之長而取效最捷於獨參湯何疑耶按若病兼別因則又當隨機應變於獨參湯中或加熟附補陽而回厥逆或加生地涼陰而止吐衄或加黃耆固表之汗或加當歸救血之脫或加薑汁以除嘔吐或加童便以止陰煩或加茯苓令水化津生治消渴泄瀉或加黃連折火逆衝上治啉口毒痢是乃相得相須以有成亦何害其為獨哉如薛己治中風加人參兩許於三生飲中以駕馭其邪此真善用獨參者矣參附湯治陰陽氣血暴脫等證人參附子制水煎服注先身而生謂之先天後身而生謂之後天先天之氣在腎是父母之所賦後天之氣在脾是水穀之所化先天之氣為氣之體體主靜故子在胞中賴母息以養生氣則神藏而機靜後天之氣為氣之用用主動故育形之後資水穀以奉生身則神發而運動天人合德二氣互用故後天之氣得先天之氣則生生而不息先天之氣得後天之氣始化化而不窮也若夫起居不慎則傷腎腎傷則先天氣虛矣飲食不節則傷脾脾傷則後天氣虛矣補後天之氣無如人參補先天之氣無如附子此參附湯之所由立也二臟虛之微甚參附量為君主二藥相須用之得當則能瞬息化氣於烏有之鄉頃刻生陽於命門之內方之最神捷者也若表虛自汗以附子易黃耆名人參黃耆湯補氣兼止汗失血陰亡以附子易生地名人參生地黃湯固氣兼救陰寒濕厥汗以人參易白朮名朮附湯除濕兼溫里陽虛厥汗以人參易黃耆名耆附湯補陽兼固表此皆參附湯之轉換變化法也醫者擴而充之不能盡述其妙生脈飲治熱傷元氣氣短倦怠口渴出汗人參麥門冬五味子水煎服注經云大氣積於胸中則肺主之夫暑熱傷肺肺傷則氣亦傷矣故氣短倦怠而喘咳也肺主皮毛肺傷則失其衛護故汗出也熱傷元氣氣傷則不能生津故口渴也是方君人參以補氣即所以補肺臣麥冬以清氣即所以清肺佐五味以斂氣即所以斂肺吳琨云一補一清一斂養氣之道備矣名曰生脈以脈得氣則充失氣則弱李杲謂夏月服生脈飲加黃耆甘草名生脈保元湯令人氣力湧出更加當歸白芍名人參飲子治氣虛喘咳吐血衄血亦虛火可補之例也保元湯治男婦氣虛之總方也嬰兒驚怯痘家虛者最宜黃耆三錢人參二錢甘草一錢肉桂春夏二三分秋冬六七分上四味水煎服集註柯琴曰昔東垣以此三味能瀉火補金培土為除煩熱之聖藥鎮小兒之驚效如桴鼓魏桂岩得之以治痘家陽虛頂陷血虛漿清皮薄發癢難灌難斂者始終用之以為血脫須補氣陽生則陰長有起死回生之功故名之為保元也又少佐肉桂分四時之氣而增損之謂桂能治血以推動其毒扶陽益氣以充達周身血內位引之出表則氣從內托血外散引之歸根則氣從外護參耆非桂引導不能獨樹其功桂不得甘草和平氣血亦不能緒其條理要非寡聞淺見者能窺其萬一也四君中不用白朮避其燥不用茯苓恐其滲也用桂而不用四物者以芎之辛散歸之濕潤芍之酸寒地黃之泥滯故耳如宜升則加升柴宜燥加苓術宜潤加當歸宜利氣加陳皮宜收加芍宜散加芎又表實去耆裡實去參中滿忌甘內熱除桂斯又當理會矣按元氣者太虛之氣也人得之則藏乎腎為先天之氣即所謂生氣之原腎間動氣者是也生化於脾為後天之氣即所謂水穀入胃其精氣行於脈中之營氣其悍氣行於脈外之衛氣者是也若夫合先後而言即大氣之積於胸中司呼吸通內外周流一身頃刻無間之宗氣者是也總之諸氣隨所在而得名實一元氣也保元者保守此元氣之謂是方用黃耆保在外一切之氣甘草保在中一切之氣人參保上中下內外一切之氣諸氣治而元氣足矣然此湯補後天水穀之氣則有餘生先天命門之氣則不足加肉桂以鼓腎間動氣斯為備耳四君子湯治面色痿白言語輕微四肢無力脈來虛弱者若內傷虛熱或飲食難化作酸須加炮姜人參白朮茯苓甘草各二錢加薑棗水煎服加木香藿香葛根為七味白朮散加陳皮為五味異功散加陳皮半夏為六君子湯加蕾香砂仁為香砂六君子湯集註張璐曰氣虛者補之以甘參朮苓草甘溫益胃有健運之功具沖和之德故為君子蓋人之一生以胃氣為本胃氣旺則五臟受蔭胃氣傷則百病叢生故凡病久虛不愈諸藥不效者惟有益胃補腎兩途故用四君子隨證加減無論寒熱補瀉先培中土使藥氣四達則周身之機運流通水穀之精微敷布何患其藥之不效哉是知四君子為司命之本也吳琨曰夫面色痿白則望之而知其氣虛矣言語輕微則聞之而知其氣虛矣四肢無力則問之而知其氣虛矣脈來虛弱則切之而知其氣虛矣如是則宜補氣是方也四藥皆甘溫甘得中之味溫得中之氣猶之不偏不倚之人故名君子本方加木香藿香葛根名七味白朮散治小兒脾虛肌熱泄瀉作渴以木藿之芳香佐四君入脾其功更捷以葛根甘寒直走陽明解肌熱而除渴也按本方加陳皮名五味異功散治氣虛而兼氣滯者再加半夏名六君子湯治氣虛而兼痰飲者再加砂仁藿香名香砂六君子湯治氣虛而兼嘔吐者此皆補中有消導之意也香砂六君子湯治氣虛痰飲嘔吐痞悶脾胃不和變生諸證者人參一錢白朮二錢茯苓二錢甘草七分陳皮八分半夏一錢砂仁八分木香七分上生薑二錢水煎服集註柯琴曰經曰壯者氣行則愈怯者著而為病蓋人在氣交之中因氣而生而生氣總以胃氣為本若脾胃一有不和則氣便著滯或痞悶噦嘔或生痰留飲因而不思飲食肌肉消瘦諸證蜂起而形消氣息矣四君子氣分之總方也人參致沖和之氣白朮培中宮茯苓清治節甘草調五臟胃氣既治病安從來然撥亂反正又不能無為而治必舉大行氣之品以輔之則補者不至泥而不行故加陳皮以利肺金之逆氣半夏以疏脾上之濕氣而痰飲可除也加木香以行三焦之滯氣縮砂以通脾腎之元氣而膹郁可開也君得四輔則功力倍宣四輔奉君則元氣大振相得而益彰矣當歸補血湯治男婦血虛似白虎證肌熱面赤煩渴引飲脈來洪大而虛重按則微當歸二錢黃耆一兩水煎服集註吳琨曰血實則身涼血虛則身熱或以飢困勞役虛其陰血則陽獨治故諸證生焉此證純象白虎但脈大而虛非大而實為辨耳內經所謂脈虛血虛是也五味之中惟甘能補當歸味甘而厚味厚則補血黃耆味甘而薄味薄則補氣今黃耆多數倍而云補血者以有形之血不能自生生於無形之氣故也經言陽生陰長是之謂耳佛手散治妊娠胎動下血或因傷動子死腹中下血疼痛口噤欲死服此探之不損則痛止已損則立下及橫生倒生交骨不開產後血暈昏亂崩中金瘡去血過多等證當歸二兩或三兩川芎一兩上銼粗末合均每服五錢水一盞酒半盞煎八分熱服未效再服加敗龜版一具梳髮一團名開骨散注命名不曰歸芎而曰佛手者謂此方治婦人胎前產後諸疾如佛手之神妙也當歸川芎為血分之主藥性溫而味甘辛以溫能和血甘能補血辛能散血也古人俱必以當歸君川芎或一倍或再倍者蓋以川芎辛竄捷於升散過則傷氣故寇宗奭曰不可單服久服亦此義也然施之於氣鬱血凝無不奏效故用以佐當歸而收血病之功使瘀去新生血各有所歸也血既有所歸則血安其部而諸血病愈矣至妊娠胎動胎傷下血非血壅胎傷即血亂妄下服此以探之血亂胎未動者血順則痛止血壅胎未損者血行痛止則胎因之而安也已動已損者血得順行則胎亦因之而順下也橫生倒生因用力太早或誤服催生之藥致氣逆血亂亦用此以調之產後崩中金瘡亡血昏冒亦用此以補之子死腹中腹痛欲死亦用此以逐之以上諸病皆血病而氣不虛者也若夫氣虛難產產後血脫唇面黃白少氣煩亂動則昏冒若誤與此反致立敗則必倍加人參速固無形之氣以救有形之血也至於交骨難開加龜版梳髮下輸陰道寒加薑桂熱加黃耆汗加桂枝搐加荊穗又當以意消息加減可也四物湯治一切血虛血熱血燥諸證當歸熟地各三錢川芎一錢五分白芍酒炒二錢上四味水煎服集註張璐曰四物為陰血受病之專劑非調補真陰之的方方書咸謂四物補陰遂以治陰虛發熱火炎失血等證蒙害至今又專事女科者咸以此湯隨證漫加風食痰氣等藥紛然雜出其最可恨者不辨熱之虛實率加知母黃柏令人久服而庸工利其有劫病之能咸樂用之殊不知四君子氣藥治上下失血過多一切血藥置而不用獨推獨參湯童便以固其脫者以有形之血不能速生無形之氣所當急固也昔人有言見血休治血必先調其氣又云四物湯不得補氣藥不能成陽生陰長之功誠哉言也然此湯傷寒火邪解後餘熱留於血分至夜微熱不除或合柴胡或加桂枝靡不應手輒效不可沒其功也柯琴曰經云心生血肝藏血故凡生血者則究之於心調血者當求之於肝也是方乃肝經調血之專劑非心經生血之主方也當歸甘溫和血川芎辛溫活血芍藥酸寒斂血地黃甘平補血四物具生長收藏之用故能使營氣安行經隧也若血虛加參耆血結加桃仁紅花血閉加大黃芒硝血寒加桂附血熱加芩連欲行血去芍欲止血去芎隨所利而行之則又不必拘拘於四矣若婦人數脫其血故用以調經種子如遇血崩血暈等證四物不能驟補而反助其滑脫則又當補氣生血助陽生陰長之理蓋此方能補有形之血於平時不能生無形之血於倉卒能調陰中之血而不能培真陰之本為血分立法不專為女科套劑也王好古治婦女不論內傷外感胎前產後隨證加二味於四物中名曰六合未免任意牽強聖愈湯治一切失血過多陰虧氣弱煩熱作渴睡臥不寧等證四物湯加人參黃耆一方去芍藥上水煎服集註柯琴曰經云陰在內陽之守也陽在外陰之使也故陽中無陰謂之孤陽陰中無陽謂之死陰朱震亨曰四物皆陰行天地閉塞之令非長養萬物者也故四物加知柏久服便能絕孕謂嫌於無陽耳此方取參耆配四物以治陰虛血脫等證蓋陰陽互為其根陰虛則陽無所附所以煩熱燥渴氣血相為表裡血脫則氣無所歸所以睡臥不寧然陰虛元驟補之法計在培陰以藏陽血脫有生血之機必先補氣此陽生陰長血隨氣行之理也故曰陰虛則無氣無氣則死矣此方得仲景白虎加人參之義而擴充者乎前輩治陰虛用八珍十全卒不獲效者因甘草之甘不達下焦白朮之燥不利腎陰茯苓滲泄礙乎生升肉桂辛熱動其虛火此六味皆醇厚和平而滋潤服之則氣血疏通內外調和合於聖度矣地骨皮飲治陰虛火旺骨蒸發熱日靜夜劇者婦人熱入血室胎前發熱者四物湯加地骨皮牡丹皮各三錢水煎服集註柯琴曰陰虛者陽往乘之發熱也當分三陰而治之陽邪乘入太陰脾部當補中益氣以升舉之清陽復位而火自熄也若乘入少陰腎部當六味地黃丸以對待之壯水之主而火自平也乘入厥陰肝部當地骨皮飲以涼補之血有所藏而火自安也四物湯為肝家滋陰調血之劑加地骨皮清志中之火以安腎補其母也加牡丹皮清神中之火以涼心瀉其子也二皮涼而不潤但清肝火不傷脾胃與四物加知柏之濕潤而苦寒者不同也故逍遙散治肝火之鬱於本臟者也木鬱達之順其性也地骨皮飲治陽邪之乘於肝臟者也客者除之勿縱寇以遺患也二方皆肝家得力之劑犀角地黃湯治熱傷吐衄便血婦人血崩赤淋生犀角生地黃白芍牡丹皮上四味先用三物水煎去滓入生犀汁熱服注吐血之因有三曰勞傷曰努傷曰熱傷勞傷以理損為主努傷以去瘀為主熱傷以清熱為主熱傷陽絡則吐衄熱傷陰絡則下血是湯治熱傷也故用犀角清心去火之本生地涼血以生新血白芍斂血止血妄行丹皮破血以逐其瘀此方雖曰清火而實滋陰雖曰止血而實去瘀瘀去新生陰滋火熄可為探本窮源之法也若心火獨盛則加黃芩黃連以瀉熱血瘀胸痛則加大黃桃仁以逐瘀也四生丸治陽盛陰虛血熱妄行或吐或衄者生地黃生柏葉生荷葉生艾葉各等分上四味搗爛為丸如雞子大每服一丸滾湯化服集註柯琴曰陰虛而陽無所附則火炎上焦陽盛則陽絡傷故血上溢於口鼻也凡草木之性生者涼而熟之則溫熟者補而生者瀉四味皆清寒之品盡取其生者而搗爛為丸所以全其水氣不經火煮更遠於火令矣生地多膏清心腎而通血脈之源柏葉西指清肺金而調營衛之氣艾葉芳香入脾胃而擅去瘀生新之權荷葉法震入肝家而和藏血攝血之用五志之火既清五臟之陰安堵則陰平陽秘而血歸經矣是方也可暫用以遏妄行之熱血如多用則反傷營蓋血得寒則瘀血不散而新血不生也設但知清火涼血而不用歸脾養榮等劑以善其後鮮有不綿連歲月而斃者非立法之不善妄用者之過耳當歸六黃湯治陰虛有火令人盜汗者當歸生地熟地黃耆黃芩黃連黃柏上水煎服注寤而汗出曰自汗寐而汗出曰盜汗陰盛則陽虛不能外固故自汗陽盛則陰虛不能中守故盜汗若陰陽平和之人衛氣晝則行陽而寐夜則行陰而寐陰陽既濟病安從來惟陰虛有火之人寐則衛氣行陰陰虛不能濟陽陽火因盛而爭於陰故陰液失守外走而汗出寤則衛氣復行出於表陰得以靜故汗止矣用當歸以養液二地以滋陰令陰液得其養也用黃芩瀉上焦火黃連瀉中焦火黃柏瀉下焦火令三火得其平也又於諸寒藥中加黃耆庸者不知以為贅品且謂陽盛者不宜抑知其妙義正在於斯耶蓋陽爭於陰汗出營虛則衛亦隨之而虛故倍加黃耆者一以完已虛之表一以固未定之陰經曰陰平陽秘精神乃治此之謂歟集註吳琨曰雜證盜汗與傷寒盜汗不同傷寒是半表半裡之邪未盡雜證則陰虛有火而已彼以和表為主此以救陰為急故以補陰之品佐瀉火之藥明者辨之黃耆建中湯治虛勞裡急悸衄腹中痛夜夢失精四肢痠痛手足煩熱咽干口燥諸不足諸證黃耆膠飴白芍甘草桂枝生薑大棗上七味水煎服集註喻昌曰虛勞而至於亡血失精津液枯槁難為力矣內經於針砭所莫治者調以甘藥金匱遵之而立黃耆建中湯急建其中氣俾飲食增而津液旺以至充血生精而復其真陰之不足但用稼穡作甘之本味而酸辛鹹苦在所不用蓋舍此別無良法也然用法貴立於元過之地不獨嘔家不可用建中之甘即微覺氣滯更當慮甘藥大過令人中滿也至大建中則大建其中之陽小建中則小小建立之義理中則燮理之義治中則分治之義補中溫中何莫非先中州之義緣傷寒外邪逼入於內法難盡用仲景但於方首以小之一字微示其意至金匱始盡建中之義後人引伸觸類制樂令建中湯十四味建中湯曲暢建中之旨學者心手之間所當會其大義也雙和飲治大病之後虛勞氣乏補血益氣不熱不冷溫而調之白芍二錢黃耆炙一錢半甘草炙七分中桂七分當歸一錢熟地黃一錢川芎七分生薑三片大棗二枚水二盞煎一盞溫服注此湯乃李杲以黃耆建中湯減飴糖合四物之方也黃耆建中治虛勞不足是從脾胃中化生血氣此則直補陰血兼之溫養陽氣所以減飴糖之甘加純陰之品名曰雙和也地骨皮飲其意在涼血熱故佐二皮以清之聖愈湯其意在救血脫故佐參耆以補之雙和飲其意在溫養血氣故佐耆桂炙草以溫之經曰形不足者溫之以氣是也人參養榮湯治脾肺俱虛發熱惡寒肢體瘦倦食少作瀉等證若氣血虛而變見諸證弗論其病其脈但用此湯諸證悉退人參白朮茯苓甘草黃耆陳皮當歸熟地白芍桂心遠志五味子上十二味加姜三片棗二枚水煎服集註柯琴曰古人治氣虛以四君子治血虛以四物氣血俱虛者以八珍更加黃耆肉桂名十全大補宜乎萬舉萬當也而用之有不獲效者蓋補氣而不用行氣之品則氣虛之甚者幾無氣以運動補血而仍用行血之物則血虛之甚者更無血以流行故加陳皮以行氣而補氣者悉得效其用去川芎行血之味而補血者因以奏其功此善治者只一加一減便能轉旋造化之機也然氣可召而至血易虧而難成苟不有以求其血脈之主而養之則營氣終歸不足故倍人參為君而佐以遠志之苦先入心以安神定志使甘溫之品始得化而為血以奉生身又心苦緩必得五味子之酸以收斂神明使營行脈中而流於四臟名之曰養榮不必仍十全之名而收效有如此者歸脾湯治思慮傷脾或健忘怔忡驚悸盜汗寤而不寐或心脾作痛嗜臥少食及婦女月經不調人參龍眼肉黃耆甘草白朮茯苓木香當歸酸棗仁遠志姜三片水煎服集註羅謙甫曰方中龍眼棗仁當歸所以補心也參耆朮苓草所以補脾也薛己加入遠志又以腎藥之通乎心者補之是兩經兼腎合治矣而特名歸脾何也夫心藏神其用為思脾藏智其出為意見神智思意火土合德者也心以經營之久而傷脾以意慮之鬱而傷則母病必傳之子子又能令母虛所必然也其病則健忘怔忡怵惕不安之徵見於心也飲食倦怠不能運輸手足無力耳目昏眊既之證見於脾也故脾陽苟不運心腎必不交彼黃婆者若不為之媒合則已不能攝腎氣歸心而心陰何所賴以養此取坎填離者所以必歸之脾也其藥一滋心陰一養脾陽取乎健者以壯子益母然恐脾郁之久思意不通故少取木香之辛且散者以暢氣醒脾使能速通脾氣以上行心陰脾之所歸正在斯耳張璐曰補中益氣與歸脾同出保元並加歸術而有升舉胃氣滋補脾陰之不同此方滋養心脾鼓動少火妙佐以木香少許調順諸氣暢和心脾世醫不諳此理反以木香性燥不用服之多致痞悶減食者以其補藥多滯不能輸化故耳妙香散治夢遺失精驚悸鬱結山藥二兩人參黃耆遠志制茯苓茯神一兩桔梗三錢甘草辰砂另研一錢麝香一錢木香二錢五分為末每服二錢酒下集註汪昂曰心君火也君火一動相火隨之相火寄於肝膽腎之陰虛則精不藏肝之陽強則氣不固故精脫而成夢矣山藥益陰兼能澀精故以為君人參黃耆用以固氣遠志二茯用以寧神神寧氣固則精自守其位矣丹砂鎮心安魂二香開鬱通竅桔梗載諸心藥久留膈上甘草調和諸藥交和於中是方不以瀉火固澀立法但安神固氣使精與神氣相依而夢少精秘矣按朱震亨云主秘藏者腎也司疏泄者肝也二臟有相火而其繫上屬於心心君火也為物所感則易於動心動則相火翕然隨之雖不交會精亦暗流而滲漏矣所以聖人只是教人收心養性其旨深矣震亨此論至當其平生精力在補陰以制相火深得內經天以陽生陰長地以陽殺陰藏之旨近世醫者惟知陽生不知陰亦能生惟知陰殺不知陽亦能殺經雖每每指出陽脫陰脫陽絕陰絕皆令人死奈志迷偏見者不回也即此一證老年之人心有所動而相火衰不能翕然隨之雖有所夢而無所遺由此可知震亨用黃柏一味少佐冰片名清心丸獨瀉相火而治中年相火盛夢遺心悸者屢用屢效也天王補心丹治心血不足神志不寧津液枯竭健忘怔忡大便不利口舌生瘡等證人參酸棗仁當歸生地黃麥冬天冬柏子仁遠志五味子丹參元參白茯苓桔梗上為末煉蜜丸如椒目大白湯下集註柯琴曰心者主火而所以主之者神也火盛則神困心藏神補神者必補其心補心者必清其火而神始安補心丹故用生地黃為君取其下足少陰以滋水主水盛可以伏火此非補心之陽乃補心之神耳凡果核之有仁猶心之有神也清氣無如柏子仁補血無如酸棗仁以其神存耳參苓之甘以補心氣五味之酸以收心氣二冬之寒以清氣分之火心氣和而神自歸矣當歸之甘以補心血丹參之寒以生心血元參之咸以清血中之火血足而神自藏矣更加桔梗為舟楫遠志為嚮導和諸藥入心而安神明以此養生則百體從令何有健忘怔忡津液乾涸舌上生瘡大便不利之虞哉酸棗仁湯治虛勞虛煩不得眠酸棗仁二升甘草一兩知母二兩白茯苓二兩川芎二兩上五味以水八升煮棗仁得六升內藥煮取三升分溫三服集註羅謙甫曰經云肝藏魂人臥則血歸於肝又曰肝者罷極之本又曰陽氣者煩勞則張罷極必傷肝煩勞則精絕肝傷精絕則虛勞虛煩不得臥明矣棗仁酸平應少陽木化而治肝極者宜收宜補用酸棗仁至二升以生心血養肝血所謂以酸收之以酸補之是也顧肝鬱欲散散以川芎之辛散使輔棗仁通肝調榮又所謂以辛補之也肝急欲緩緩以甘草之甘緩使防川芎疏泄過急此所謂以土葆之也然終恐勞極則火發傷陰陽旺陽分不行於陰而仍不得眠故佐知母崇陰水以制火茯苓利陽水以平陰將水壯而魂自寧火清而神且靜矣此治虛勞肝極之神方也硃砂安神丸治心神昏亂驚悸怔忡寤寐不安硃砂另研黃連各半兩當歸二錢生地黃三錢甘草三錢上為細末酒泡蒸餅丸如麻子大硃砂為衣每服三十九臥時津液下集註葉仲堅曰經云神氣舍心精神畢具又曰心者生之本神之舍也且心為君主之官主不明則精氣亂神太勞則魂魄散所以寤寐不安淫邪發夢輕則驚悸怔忡重則癡妄癲狂也硃砂具光明之體色赤通心重能鎮怯寒能勝熱甘以生津抑陰火之浮游以養上焦之元氣為安神之第一品心若熱配黃連之苦寒瀉心熱也更佐甘草之甘以瀉之心主血用當歸之甘溫歸心血也更佐地黃之寒以補之心血足則肝得所藏而魂自安心熱解則肺得其職而魄自寧也
