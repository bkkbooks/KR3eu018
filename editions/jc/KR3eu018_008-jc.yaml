body:
  text: 卷八刪補名醫方論八小柴胡湯治傷寒五六日寒熱往來胸脅苦滿嘿嘿不欲飲食心煩喜嘔口苦耳聾脈弦數者此是少陽經半表半裡之證宜此湯以和解之柴胡半斤黃芩三兩人參三兩半夏半升甘草炙三兩生薑切三兩大棗擘十二枚上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服若胸中煩而不嘔去半夏人參加栝蔞實若渴者去半夏加人參栝蔞根若腹中痛去黃芩加芍藥若脅下痞硬去大棗加牡蠣若心下悸小便不利者去黃芩加茯苓若不渴外有微熱者去人參加桂枝溫覆取微似汗愈若咳者去人參大棗生薑加五味子乾薑集註程應旄曰方以小柴胡名者取配乎少陽之義也至於制方之旨及加減法則所云上焦得通津液得下胃氣因和盡之矣何則少陽脈循脅肋在腹陽背陰兩岐間在表之邪欲入里為裡氣所拒故寒往而熱來表裡相拒而留於岐分故胸脅苦滿神識以拒而昏困故嘿嘿木受邪則妨土故不欲食膽為陽木而居清道為邪所郁火無從泄逼炎心分故心煩清氣鬱而濁則成痰滯故喜嘔嘔則木火兩舒故喜之也此則少陽定有之證其餘或之云者以少陽在人身為遊部凡表裡經絡之罅皆能隨其虛而見之不定之邪也據證俱是太陽經中所有者特以五六日上見故屬之少陽半表半裡兼而有之方是小柴胡證方中以柴胡疏木使半表之邪得從外宣黃芩清火使半里之邪得從內徹半夏豁痰飲降裡氣之逆人參補久虛助生髮之氣甘草佐柴芩調和內外薑棗佐參夏通達營衛相須相濟使邪無內向而外解也至若煩而不嘔者火成燥實而逼胸故去人參半夏加栝蔞實也渴者燥已耗液而逼肺故去半夏加栝蔞根也腹中痛木氣散入土中胃陽受困故去黃芩以安土加白芍以戢木也脅下痞硬者邪既留則木氣實故去大棗之甘而泥加牡蠣之咸而軟也心下悸小便不利者水邪侵乎心矣故去黃芩之苦而伐加茯苓之淡而滲也不渴身有微熱者半表之寒尚滯於肌故去人參加桂枝以解之也咳者半表之寒湊入於肺故去參棗加五味子易生薑為乾薑以溫之雖肺寒不減黃芩恐乾薑助熱也總之邪在少陽是表寒裡熱兩郁不得升之故小柴胡之治所謂升降浮沉則順之也大柴胡湯治熱結在內心下急嘔不止鬱郁微煩柴胡證仍在者與大柴胡湯下之柴胡半斤黃芩三兩半夏半升芍藥三兩枳實四枚大黃二兩生薑五兩大棗擘十二枚上八味以水一斗二升煮取六升去滓再煎溫服一升日三服注柴胡證在又復有里故立少陽兩解法也以小柴胡湯加枳實芍藥者仍解其外以和其內也去參草者以里不虛少加大黃以瀉結熱倍生薑者因嘔不止也斯方也柴胡得生薑之倍解半表之功捷枳芍得大黃之少攻半里之效徐雖云下之亦下中之和劑也柴胡桂枝湯傷寒六七日發熱微惡寒肢節煩疼微嘔心下支結此太陽少陽並病也柴胡桂枝湯主之柴胡四兩桂枝一兩半人參一兩半甘草一兩半夏洗二合半黃芩一兩半芍藥一兩半大棗擘六枚生薑切一兩半上九味以水七升煮取三升去滓分溫服集註柯琴曰仲景書中最重柴桂二方以桂枝解太陽肌表又可以調諸經之肌表小柴胡解少陽半表亦可以和三陽之半表故於六經病外獨有桂枝證柴胡證之稱見二方之任重不拘於經也如陽浮陰弱條是仲景自為桂枝證之註釋血弱氣虛條亦仲景自為柴胡證之註釋桂枝有壞病柴胡亦有壞病桂枝有疑似證柴胡亦有疑似證病如桂枝證而實非若腳攣急與胸中痞硬者是已病如柴胡證而實非本渴而飲水嘔食谷嘔與但欲嘔胸中痛微溏者是已此條為傷寒六七日正寒熱當退之時反見發熱惡寒諸表證更見心下支結諸里證表裡不解法當表裡雙解之然惡寒微發熱亦微可知肢節煩疼則一身骨節不疼可知微嘔心下亦微結故謂之支結表證雖不去而已輕里證雖已見而未甚故取桂枝之半以散太陽未盡之邪取柴胡之半以解少陽微結之證口不渴身有微熱者法當去人參以六七日來邪雖未解而正已虛故仍用之外證雖在而病機已見於里故方以柴胡冠桂枝之上為雙解兩陽之輕劑也黃芩湯治太陽少陽合病自下利者若嘔者加半夏生薑黃芩甘草芍藥各三兩大棗擘十二枚上四味以水一斗煮取三升去滓溫服一升日再服夜一服嘔者加半夏半升生薑三兩集註程應旄曰此之合病者頭痛胸滿口苦咽乾目眩或往來寒熱或脈大而弦半表之邪不待太陽傳遞而即合少陽裡氣失守所以下利陽熱漸盛所以上嘔故用黃芩湯清熱益陰半里清而半表自解矣柯琴曰太陽少陽合病是熱邪已入少陽之裡膽火下攻於脾故自下利上逆於胃故兼嘔也與黃芩湯酸苦相濟調中以存陰也熱不在半表故不用柴胡今熱已入半里故黃芩主之雖非胃實亦非胃虛故不須人參以補中兼嘔者故仍加半夏生薑以降逆也黃連湯治傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連三兩乾薑三兩甘草三兩人參二兩桂枝三兩半夏半升大棗十二枚上七味以水一斗煮取六升去滓溫服一升日三服夜二服集註程應旄曰熱在胸中有煩躁鬱悶之證可知胃中反有邪氣以寒邪被格在下故也此證寒熱俱有較之大青龍之寒熱已向近里一層故其證不見之表裡際而只見之上下際腹中痛者陰邪在胃而寒乃獨治於下也欲嘔吐者陽邪在胸而熱乃獨治於上也此為上下相格治法亦寒熱並施而辛寒易以苦寒辛熱加以苦熱更以人參半夏以補宣中氣升降陰陽自此條而互及瀉心諸湯皆其法也成無己曰濕家下後舌上如苔者以丹田有熱胸中有寒是邪氣入里而為下熱上寒也此傷寒傳裡而為下寒上熱也喻昌曰陰陽悖逆皆當和解法黃連阿膠湯治少陰病得之二三日以上心中煩不得臥黃連四兩黃芩一兩芍藥二兩雞子黃二枚阿膠三兩上五味以水五升先煮三物取二升去滓內膠烊盡小冷內雞子黃攪令相得溫服七合日三服集註柯琴曰此少陰病之瀉心湯也凡瀉心必藉連芩而導引有陰陽之別病在三陽胃中不和而心下痞硬者虛則加參甘補之實則加大黃下之病在少陰而心中煩不得臥者既不得用參甘以助陽亦不得用大黃以傷胃矣用芩連以直折心火用阿膠以補腎陰雞子黃佐芩連於瀉心中補心血芍藥佐阿膠於補陰中斂陰氣斯則心腎交合水升火降是以扶陰瀉陽之方變而為滋陰和陽之劑也是則少陰之火各歸其部心中之煩不得臥可除矣經曰陰平陽秘精神乃治斯方之謂歟理中湯丸治中氣不運腹中不實口失滋味病久不食臟腑不調與傷寒直中太陰自利不渴寒多而嘔等證人參三兩白朮三兩甘草三兩乾薑三兩上四味搗篩為末蜜丸如雞子黃大以沸湯數合和一丸研碎溫服之日三四枚夜二枚腹中未熱益至三四丸然不及湯湯法以四物依兩數切用水八升煮取三升去滓溫服一升日三服若臍上築者腎氣動也去朮加桂四兩多吐者去朮加生薑三兩下多者還用術悸者加茯苓二兩渴欲得水者加朮足前成四兩半腹中痛者加人參足前成四兩半寒者加乾薑足前成四兩半腹滿者去朮加附子一枚服湯後如食頃飲熱粥一升許微自溫勿發衣被集註程應旄曰陽之動始於溫溫氣得而穀精運穀氣升而中氣贍故名曰理中實以燮理之功予中焦之陽也若胃陽虛則中氣失宰膻中無發宣之用六腑無灑陳之功猶如釜薪失焰故下致清穀上失滋味五臟凌奪諸證所由來也參朮炙草所以守中州乾薑辛以溫中必假之以焰釜薪而騰陽氣是以谷入於陰長氣於陽上輸華蓋下攝州都五臟六腑皆以受氣此理中之旨也若水寒互勝即當脾腎雙溫加以附子則命門益土母溫矣白朮補脾得人參則壅氣故臍下動氣吐多腹滿者去朮也加桂以伐腎邪加生薑以止嘔也加附子以消陰也下多者濕勝也還用術燥濕也渴欲飲水飲渴也加朮使飲化津生也心下悸停水也加茯苓導水也腹中痛倍人參虛痛也寒者加乾薑寒甚也乾薑附子湯下後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脈沉微身無大熱者乾薑附子湯主之乾薑一兩附子去皮生用破八片一枚上二味以水三升煮取一升去滓頓服茯苓四逆湯傷寒厥而心下悸發汗若下之病仍不解煩躁者茯苓四逆湯主之茯苓六兩人參一兩甘草炙一兩乾薑一兩附子生用破八片一枚上五味以水五升煮取三升去滓溫服七合日三服注凡太陽病治不如法汗後復下或下後復汗誤而又誤變成壞病若其人陽盛而從熱化則轉屬三陽陽衰而從寒化則系在三陰此二湯所治之煩躁皆壞病也煩躁雖六經俱有而多見於太陽少陰者太陽為真陰之標少陰為真陽之本也未經汗下而煩躁多屬陽其脈實大其證渴熱是煩為陽盛躁為陰虛已經汗下而煩躁多屬陰其脈沉微其證汗厥是煩為陽虛躁為陰極也夫先下後汗於法為逆外無大熱內不渴嘔似乎陰陽自和而實妄汗亡陽所以虛陽擾亂於陽分故晝日煩躁不得眠盛陰偏安於陰分故夜而安靜脈沉微是真陽將脫而煩躁也用乾薑附子壯陽以配陰薑附者陽中陽也生用則力更銳不加甘草則勢更猛是方比四逆為峻救其相離故當急也先汗後下於法雖順若病不解厥悸仍然驟增晝夜煩躁似乎陰盛格陽而實腎上凌心皆因水不安其位挾陰邪而上乘是陽虛有水氣之煩躁也用茯苓君四逆抑陰以伐水人參佐四逆生氣而益陽參苓君子也兼調以甘草比四逆為緩陰陽不急故當緩也一去甘草一加參苓而緩急自別仲景用方之妙如此附子湯治少陰病身痛手足寒骨節痛口中和背惡寒脈沉者附子生用去皮破八片二枚茯苓三兩人參二兩白朮四兩芍藥三兩上五味以水八升煮取三升去滓溫服一升日三服注少陰為寒水之臟故傷寒之重者多入少陰所以少陰一經最多死證方中君附子二枚者取其力之銳且以重其任也生用者一以壯少火之陽一以散中外之寒則惡寒自止身痛自除手足自溫矣所以固生氣之原令五臟六腑有本十二經脈有根脈自不沉骨節可和矣更佐白朮以培土芍藥以平木茯苓以伐水水伐火自旺旺則陰翳消木平土益安安則水有制制則生化此萬全之術其畏而不敢用束手待斃者曷可勝計耶四逆湯治脈沉厥逆等證甘草炙二兩乾薑一兩半附子生用去皮破八片一枚上三味以水三升煮取一升二合去滓分溫再服強人可大附子一枚乾薑三兩注方名四逆者主治少陰中外皆寒四肢厥逆也君以炙草之甘溫溫養陽氣臣以薑附之辛溫助陽勝寒甘草得薑附鼓腎陽溫中寒有水中暖土之功姜附得甘草通關節走四肢有逐陰回陽之力腎陽鼓寒陰消則陽氣外達而脈升手足溫矣通脈四逆湯治少陰下利清穀裡寒外熱手足厥逆脈微欲絕身反不惡寒其人面赤色或腹痛或乾嘔或咽痛或利止脈不出者厥陰下利清穀裡寒外熱汗出而厥者主之乾薑三兩強人可四兩甘草炙二兩附子生用去皮大者一枚上三味以水三升煮取一升二合去滓分溫再服其脈即出者愈面色赤者加蔥九莖腹中痛者去蔥加芍藥二兩嘔者加生薑二兩咽痛去芍藥加桔梗一兩利止脈不出者加人參二兩注論中扶陽抑陰之劑中寒陽微不能外達主以四逆中外俱寒陽氣虛甚主以附子陰盛於下格陽於上主以白通陰盛於內格陽於外主以通脈是則可知四逆運行陽氣者也附子溫補陽氣者也白通宣通上下之陽氣者也通脈通達內外之陽氣者也今脈微欲絕裡寒外熱是腎中陰盛格陽於外故主之也倍乾薑加甘草佐附子易名通脈四逆湯者以其能大壯元陽主持中外共招外熱反之於內蓋此時生氣已離亡在俄頃若以柔緩之甘草為君豈能疾呼外陽耶故易以乾薑然必加甘草與乾薑等分者恐渙漫之餘薑附之猛不能安養元氣所謂有制之師也若面赤者加蔥以通格上之陽腹痛者加芍藥以和在裡之陰嘔逆者加生薑以止嘔咽痛者加桔梗以利咽利止脈不出氣少者俱倍人參以生元氣而復脈也白通湯治少陰病下利脈微者與白通湯利不止厥逆元脈乾嘔煩者白通加豬膽汁湯主之服湯脈暴出者死脈微續者生蔥白四莖乾薑一兩附子生用去皮破八片一枚上三味以水三升煮取一升去滓分溫再服白通加豬膽汁湯蔥白四莖乾薑一兩附子生用去皮破八片一枚人尿五合豬膽汁一合以上三味以水三升煮取一升去滓內豬膽汁人尿和令相得分溫再服若無膽汁亦可注是方也即四逆湯減甘草加蔥白也而名之曰白通者以蔥白能通陽氣也減甘草者因其緩也加尿膽者從其類也下咽之後冷體既消熱性便發情且不違而致大益則二氣之拒格可調上下之陰陽可通矣真武湯治少陰水氣為患腹痛下利四肢沉重疼痛小便不利其人或咳或嘔或小便利而下利者用此加減白朮二兩茯苓二兩白芍二兩大附子炮一枚生薑切三兩上五味以水八升煮取三升去滓溫服七合日三服若咳者加五味子半升細辛乾薑各一兩若小便利者去茯苓若下利去芍藥加乾薑二兩若嘔去附子加生薑足成半斤注小青龍湯治表不解有水氣中外皆寒實之病也真武湯治表已解有水氣中外皆寒虛之病也真武者北方司水之神也以之名湯者藉以鎮水之義也夫人一身制水者脾也主水者腎也腎為胃關聚水而從其類倘腎中無陽則脾之樞機雖運而腎之關門不開水即欲行以無主制故泛溢妄行而有是證也用附子之辛熱壯腎之元陽則水有所主矣白朮之苦燥建立中土則水有所制矣生薑之辛散佐附子以補陽於主水中寓散水之意茯苓之淡滲佐白朮以健土於制水中寓利水之道焉而尤妙在芍藥之酸收仲景之旨微矣蓋人之身陽根於陰若徒以辛熱補陽不少佐以酸收之品恐真陽飛越矣用芍藥者是亟收陽氣歸根於陰也於此推之則可知誤服青龍致發汗亡陽者所以於補陽藥中之必需芍藥也然下利減芍藥者以其陽不外散也加乾薑者以其溫中勝寒也水寒傷肺則咳加細辛乾薑者散水寒也加五味子者收肺氣也小便利者去茯苓以其雖寒而水不能停也嘔者去附子倍生薑以其病非下焦水停於胃也所以不須溫腎以行水只當溫胃以散水且生薑功能止嘔也當歸四逆湯手足厥冷脈細欲絕者主之若其人內有久寒加吳茱萸生薑當歸三兩桂枝三兩芍藥三兩細辛二兩通草二兩甘草炙二兩大棗擘二十五枚上七味以水八升煮取三升去滓溫服一升日三服當歸四逆加吳茱萸生薑湯於前湯內加吳茱萸半斤生薑三兩上九味以水六升清酒六升和煮取五升去滓分溫五服注凡厥陰病則脈微而厥以厥陰為三陰之盡陰盡陽生若受其邪則陰陽之氣不相順接故脈微而厥也然厥陰之臟相火遊行其間經雖受寒而臟不即寒故先厥者後必發熱所以傷寒初起見其手足厥冷脈細欲絕者不得遽認為虛寒而用薑附也此方取桂枝湯君以當歸者厥陰主肝為血室也佐細辛味極辛能達三陰外溫經而內溫臟通草其性極通善開關節內通竅而外通營倍加大棗即建中加飴用甘之法減去生薑恐辛過甚而迅散也肝之志苦急肝之神欲散甘辛並舉則志遂而神悅未有厥陰神志遂悅而脈微不出手足不溫者也不須參苓之補不用薑附之峻此厥陰厥逆與太少不同治也若其人內有久寒非辛溫之品所能兼治則加吳茱萸生薑之辛熱更用酒煎佐細辛直通厥陰之臟迅散內外之寒是又救厥陰內外兩傷於寒之法也吳茱萸湯治厥陰病乾嘔吐涎沫頭痛者少陰證吐利手足厥冷煩躁欲死者陽明食谷欲嘔者吳茱萸一升人參三兩生薑六兩大棗擘十二枚上四味以水七升煮取二升溫服七合日三服集註羅謙甫曰仲景救陽諸法於少陰四逆湯必用姜附通脈四逆湯倍加乾薑其附子生用附子湯又加生附至二枚所以然者或壯微陽使之外達或招飛陽使之內返此皆少陰真陽失所故以回陽為亟也至其治厥陰則易以吳茱萸而並去前湯諸藥獨用人參薑棗者蓋人身厥陰肝木雖為兩陰交盡而一陽之真氣實起其中此之生氣一虛則三陰濁氣直逼中上不惟本經諸證悉具將陽明之健運失職以至少陰之真陽浮露而吐利厥逆煩躁欲死食谷欲嘔種種叢生矣吳茱萸得東方震氣辛苦大熱能達木鬱直入厥陰降其盛陰之濁氣使陰翳全消用以為君人參秉沖和之氣甘溫大補能接天真挽回性命升其垂絕之生氣令陽光普照用以為臣佐薑棗和胃而行四末斯則震坤合德木土不害一陽之妙用成而三焦之間無非生生之氣矣諸證有不退者乎蓋仲景之法於少陰則重固元陽於厥陰則重護生氣學者當深思而得之矣烏梅丸治厥陰病消渴氣上撞心心中疼熱飢而不欲食食即吐蛔又主久痢烏梅三百個細辛六兩乾薑十兩黃連一斤當歸四兩附子六兩蜀椒去汗四兩桂枝六兩人參六兩黃柏六兩上十味異搗篩合治之以苦酒浸烏梅一宿去核蒸之五升米下飯熟搗成泥和藥令相得內臼中與蜜杵二千下九如梧桐子大先食飲服十丸日三稍加至二十丸禁生冷滑物臭食等集註柯琴曰六陰惟厥陰為難治其本陰其標熱其體木其用火必伏其所主而先其所因或收或散或逆或從隨所利而行之調其中氣使之和平是治厥陰法也厥陰當兩陰交盡又名陰之絕陽宜無熱矣第其具合晦朔之理陰之初盡即陽之初生所以厥陰病熱是少陽使然也火王則水虧故消渴氣上撞心心中疼熱氣有餘便是火也木勝則剋土故飢不欲食蟲為風化飢則胃中空虛蛔聞食臭出故吐蛔也仲景立方皆以甘辛苦味為君不用酸收之品而此用之者以厥陰主肝木耳洪範曰木曰曲直作酸內經曰木生酸酸入肝君烏梅之大酸是伏其所主也配黃連瀉心而除疼佐黃柏滋腎以除渴先其所因也連柏治厥陰陽邪則有餘不足以治陰邪也椒附辛姜大辛之品並舉不但治厥陰陰邪且肝欲散以辛散之也又加桂枝當歸是肝藏血求其所屬也寒熱雜用則氣味不和佐以人參調其中氣以苦酒浸烏梅同氣相求蒸之米下資其穀氣加蜜為丸少與而漸加之緩則治其本也蛔昆蟲也生冷之物與濕熱之氣相成故藥亦寒熱互用且胸中煩而吐蛔則連柏是寒因熱用也蛔得酸則靜得辛則伏得苦則下信為治蟲佳劑久痢則虛調其寒熱酸以收之下痢自止赤石脂禹餘糧湯治久利不止大腸虛脫服理中丸而利益甚者赤石脂搗碎一斤禹餘糧搗碎一斤上二味以水六升煮取二升去滓分溫三服集註柯琴曰甘薑參術可以補中宮元氣之虛而不足以固下焦脂膏之脫此利在下焦故不得以理中之劑收功矣然大腸之不固無責在胃關門之不閉無責在脾二石皆土之精氣所結實胃而澀腸急以治下焦之標者實以培中宮之本也要知此證土虛而火不虛故不宜於薑附若濕甚而虛不甚複利不止者故又當利小便也白頭翁湯治厥陰熱利下重脈沉弦渴欲飲水者白頭翁三兩黃連三兩黃柏三兩秦皮三兩上四味以水七升煮取三升去滓溫服一升不愈更服一升注三陰俱有下利證自利不渴者屬太陰也自利而渴者屬少陰也惟厥陰下利屬於寒者厥而不渴下利清穀屬於熱者消渴下重下利膿血此熱利下重乃火鬱濕蒸穢氣奔迫廣腸魄門重滯而難出內經云暴注下迫者是矣君以白頭翁寒而苦辛臣以秦皮寒而苦澀寒能勝熱苦能燥濕辛以散火之郁澀以收下重之利也佐黃連清上焦之火則渴可止使黃柏瀉下焦之熱則利自除也治厥陰熱利有二初利用此方以苦燥之以辛散之以澀固之是謂以寒治熱之法久利則用烏梅丸之酸以收火佐以苦寒雜以溫補是謂逆之從之隨所利而行之調其氣使之平也
