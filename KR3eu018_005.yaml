body:
  text: 卷五刪補名醫方論五礞石滾痰丸治實熱老痰之峻劑虛寒者不宜用黃芩八兩大黃酒蒸八兩沉香忌火五錢礞石焰消煅過埋地內七日用一兩上四味為細末水丸川椒大量人大小用之用溫水一口送過咽即仰臥令藥徐徐而下半日不可飲食勿起身行動言語待藥氣自胃口漸下二腸然後動作飲食服後喉間稠黏壅滯不快此藥力相攻故痰氣泛上也少頃藥力至而漸逐惡物人腹下腸效如響應指迷茯苓丸治中焦停痰伏飲半夏制二兩茯苓一兩枳殼五錢風化硝二錢半上四味薑汁糊為丸注經曰飲入於胃遊溢精氣上輸於脾遊者運行也溢者滲溢也輸者輸布也精氣者水化之精氣也言入於胃運行水化之精氣滲溢於腸胃之外而上輸布於脾也又曰脾氣散精上歸於肺言水之清者上升猶天之雨露也又曰通調水道下輸膀胱言水之濁者下降猶地之江河也此皆言水自濁化清由腑輸臟自清分濁由臟輸腑水之運行循環也又曰水精四布五經並行言水發源於脾周布四臟並行五經也此皆言水內養臟腑外滋百骸水之變化精微也如是者何痰之有若飲食失度不和於中水精不滲溢於外直下走大小腸而為泄瀉矣若三焦失運氣不蒸化水之清者不升水之濁者不降精化為水則內停作脹外泛作腫上攻喘呼下蓄淋閟矣若上焦氣不清肅不能輸布留於胸中水之精者悉變為濁陽盛煎灼成痰陰盛凝蓄為飲也故治痰者以清火為主實者利之虛者化之治飲者以燥濕為主實者逐之虛者溫之所以古人治飲有溫補之法而治痰則無之也王隱君制礞石滾痰丸治老痰一方用黃芩清胸中無形諸熱大黃瀉腸胃有質實火此治痰必須清火也以礞石之燥悍此治痰必須除濕也以沉香之速降此治痰必須利氣也二黃得礞石沉香則能迅掃直攻老痰巢穴濁膩之垢而不少留滾痰之所由名也若陽氣不盛痰飲兼作又非此方所宜當以指迷茯苓丸合而治之用半夏燥濕茯苓滲濕風硝軟堅枳殼利氣別於二陳之甘緩遠於大黃礞石之峻悍殆攻中之平劑歟金匱枳朮湯治心下硬如大盤邊旋如杯水飲所作枳實七枚白朮二兩上二味以水五升煮取三升分溫三服腹中軟即散注心下胃之上脘也上脘結硬如盤邊旋如杯謂時大時小水氣所作非有形食滯也用枳實以破結氣白朮以除水濕溫服三服則腹軟結開而硬消矣李杲法仲景以此方倍白朮是以補為主也此方君枳實是以瀉為主也然一緩一急一補一瀉其用不同只此多寡轉換之間耳桂苓甘術湯治心下有痰飲胸脅支滿目眩又曰短氣有微飲當從小便去之桂苓甘術湯主之腎氣丸亦主之茯苓四兩桂枝三兩白朮三兩甘草三兩上四味以水六升煮取三升分溫三服小便則利集注趙良曰靈樞謂心胞絡之脈動則病胸脅支滿者謂痰飲積於心胞其病則必若是也目眩者痰飲阻其胸中之陽不能布精於上也茯苓淡滲遂飲出下竅因利而去故用以為君桂枝通陽輸水走皮毛從汗而解故以為臣白朮燥濕佐茯苓消痰以除支滿甘草補中佐桂枝建土以制水邪也夫短氣有微飲此水飲停蓄呼吸不利而然也金匱並出二方妙義益彰呼氣之短用苓桂朮甘湯之輕清以通其陽陽化氣則小便能出矣吸氣之短用腎氣丸之重降以通其陰腎氣通則關門自利矣按風水陽水也石水陰水也陽水多實陰水多虛陽水在上故多喘陰水在下故多滿所以治陽水用散用攻治陰水用溫用補然陰中必有陽此方治陰水在陽而上者也腎氣丸治陰水之在陰而下者也於此推之陽中亦必有陰故有小青龍湯五苓散之治法也今舉世不分陰陽虛實皆以金匱腎氣湯治之服之不效終不改轍每至吐血而死良可嘆也疏鑿飲子治遍身水腫喘呼口渴大小便祕羌活秦艽檳榔大腹皮商陸茯苓皮椒目木通澤瀉赤小豆等分加姜皮水煎服注經曰三焦者決瀆之官水道出焉若水飲阻於內風寒束於外則三焦之氣化不行上焦之如霧中焦之如漚同為下焦之如瀆也以致水氣外泛皮膚作腫內停腹裡作脹上攻喘咳嘔逆下蓄小便不利種種諸證而治法總不外乎表裡也小青龍湯真武湯越婢湯五苓散疏鑿飲子五方皆治有水氣兼表裡證之藥也小青龍湯治表裡寒實中有水氣真武湯治里有虛寒中兼水氣二證俱內不作脹外不作腫故一以麻桂輩散寒以行水一以薑附輩溫寒以制水也越婢湯治表裡實熱中有水氣五苓散治表裡虛熱中有水氣故一以麻黃石膏散膚之水清肌之熱以消腫也一以桂苓朮澤解肌表熱利所停水以止吐也疏鑿飲子治表裡俱實不偏寒熱而水濕過盛遍身水腫喘脹便祕者故以商陸為君專行諸水佐羌活秦艽腹皮苓皮姜皮行在表之水從皮膚而散佐檳榔赤豆椒目澤瀉木通行在裡之水從二便而出上下內外分消其勢亦猶神禹疏鑿江河之意也至於越婢湯加半夏者因喘氣上逆用之降逆也加附子者因汗出惡風散表固陽也小青龍湯加石膏者因喘而煩躁用之兼清胃熱也五苓散以朮桂易滑石阿膠名豬苓湯專清陰兼治水也真武湯去生薑加人參名附子湯專溫陽不治水也由此可知仲景用方於群溫劑中加以大寒之品大寒劑中加以辛熱之品去桂枝加滑石則不走外去生薑加人參則不治水其轉換變化神妙如此拘拘之士不足語也葶藶大棗瀉肺湯治肺癰喘不得臥及水飲攻肺喘急者葶藶苦一兩大棗十枚以水五盅先煮棗三盅去棗內葶藶煮取一盅半頓服弱者減服戒鹽醬蘇葶定喘丸治飲停上焦攻肺喘滿不得臥面身水腫小便不利者苦葶藶子研泥南蘇子研泥各等分合均用棗肉為小丸陰乾瓷罐盛之恐滲去油性減去藥力每服三錢於夜三更時白湯下以利四五次為度利多則減服之利少則加服之次日身軟則隔一日或隔二日服之形氣弱者先減半服之俟可漸加戒鹽醬服之即奏奇功如不嚴戒一切咸物即對證用藥萬元一生舟車神祐丸又名淨府丸治水腫水脹形氣俱實黑牽牛炒四兩大黃酒浸二兩甘遂麵裹煨一兩大戟麵裹煨一兩芫花醋炒一兩青皮炒一兩橘紅一兩木香五錢檳榔五錢輕粉一錢上為末水丸每服五分五更白滾水下大便利三次為度若一二次不通利次日仍服或六分七分漸加至一錢若服後大便利四五次或形氣不支則減其服三分二分俱可或隔一二三日服一次以愈為度甚者忌鹽醬百日注草藶大棗湯蘇葶定喘丸舟車神祐丸三方皆治腫脹之劑然葶藶大棗湯治水停胸中肺滿喘急不得臥皮膚浮腫中滿不急者故獨用葶藶之苦先瀉肺中之水氣佐大棗恐苦甚傷胃也蘇葶定喘丸即前方加蘇子以降氣氣降則水降氣降則輸水之上源水降則開水之下流也舟車神祐丸治水停諸里上攻喘咳難臥下蓄小便不利外薄作腫中停脹急者故備舉甘遂大戟芫花牽牛大黃直攻水之巢穴使從大小二便而出佐青皮陳皮木香以行氣使氣行則水行腫脹兩消其尤峻厲之處又在少加輕粉使諸攻水行氣之藥迅烈莫當無微不入無窮不達用之若當功效神奇百發百中然非形實或邪盛者不可輕試苟徒利其有劫病之能消而旋腫用者慎之實脾飲治身重懶食肢體浮腫口中不渴二便不實白朮土炒茯苓甘草炙厚朴姜炒大腹子草果仁木香木瓜附子乾薑加薑棗煎服氣虛者加人參注脾胃虛則土不能制水水妄行肌表故身重浮腫用白朮甘草生薑大棗以實脾胃之虛也脾胃寒則中寒不能化水水停腸胃故懶食不渴二便不實用薑附草果以溫脾胃之寒更佐大腹茯苓厚朴木香木瓜者以導水利氣蓋氣者水之母也土得水之防也氣行則水行土實則水治故名曰實脾也然此方導水利氣之力有餘陰水寒勝而氣不虛者固所宜也若氣少聲微則必以理中湯加附子數倍茯苓以君之溫補元氣以行水為萬當也按苓桂朮甘湯實脾飲腎氣丸皆治陽虛水氣之證苓桂朮甘湯治上焦陽虛不能輸布水留於上心下逆滿氣上衝胸故用苓桂朮甘之品扶陽通氣輸水道也實脾飲治中焦陽虛不能蒸化水漬於中外泛作腫二便通利故用薑附苓術之劑培土溫中勝寒濕也腎氣丸治下焦陽虛不能行水小便不利肢體浮腫喘急腹脹故用桂附地苓之輩溫而補之以行水也清脾飲治痰積成瘧無表裡證者青皮厚朴草果半夏柴胡白朮甘草茯苓黃芩水煎服注瘧為少陽病兼太陽表者麻桂各半湯汗之兼陽明裡者大柴胡湯下之若不兼表裡或已汗下而仍作者當從少陽和解法也是方以小柴胡四君二湯合劑清少陽而顧及於脾故名曰清脾也減人參者以氣不虛也加草果厚朴氣味俱厚之品取以輸胃之積加青皮佐茯苓半夏用以破痰之原先哲云無痰不成瘧無積不成瘧此湯是也若夫氣虛者仍加人參氣實者更加檳榔熱多者加石膏汗多者加桂枝自當臨病斟酌也芍藥湯治滯下赤白便膿血後重窘痛芍藥二兩當歸五錢黃連五錢黃芩五錢檳榔三錢木香三錢甘草三錢每服半兩水煎服痢不減加大黃注滯下起於夏秋非外因濕暑即內因生冷濕蒸熱鬱釀成初起腑病久則傳臟腑病易治臟病難治腑者何病在大腸則從金化故其色白病在小腸則從火化故其色赤所以赤痢多噤口以小腸近胃穢氣易於上攻而為嘔逆不食也臟者何傳心則熱不休下利血水傳腎則利不止如屋漏水傳脾則水漿不入吵逆不食此湯治初病在腑之方也用當歸白芍以調血木得檳榔以調氣血和則膿血可除氣調則後重自止芩連燥濕而清熱甘草調中而和藥若窘迫痛甚或服後痢不減者加大黃通因通用也溫脾湯主治錮冷在腸胃間泄瀉腹痛宜先取去然後調治不可謂虛以養病也厚朴二兩乾薑二兩甘草二兩桂心二兩附子二兩大黃四錢上㕮咀取一兩水二盅煎六分頓服集注喻昌曰許叔微制此方深合仲景以溫藥下之之法其大黃止用四錢更為有見夫錮冷在腸胃而泄瀉矣即溫藥中寧敢用大黃之猛重困之乎減五之一乃知許叔微之得於仲景深也仲景云病人舊微溏者梔子湯不可與服又云太陰病脈弱便利設當行大黃芍藥者宜減之以其人胃氣弱易動故也即是觀之腸胃錮冷之泄瀉而可恣用大黃耶不用則溫藥恐不能制而洞下之勢或至轉增裁酌用之真足法矣大黃附子湯主治脅下偏痛發熱其脈緊弦此寒也以溫藥下之大黃二兩附子炮二枚細辛二兩上三味以水五升煮取二升分溫三服若強人取二升半分三服服後如人行四五里再進集注喻昌曰仲景治傷寒熱邪痞聚心下而挾陽虛陰盛之證用附子瀉心湯之法矣其雜證脅下偏痛發熱為陽其脈弦緊為陰是則知陽中陰邪上逆也復立此溫藥下之一法然仲景諄諄傳心後世領略者鮮金匱又別出一條云其脈數而緊乃弦狀如弓弦按之不移數脈弦者當下其寒脈緊而遲者必心下堅脈大而緊者陽中有陰可下之讀者罔識其旨詎知皆以溫藥下之之法耶其曰當下其寒謂陽中有陰實之邪可下其金針不躍躍乎張璐曰三承氣湯為寒下之柔劑白散備急丸為熱下之剛劑附子瀉心湯大黃附子湯為寒熱互結剛柔並濟之和劑近世但知寒下一途絶不知有溫下一法蓋暴感之熱結可以寒下久積之寒結亦可寒下乎是以備急等法所由設也然此僅可治寒實之結設其人稟質素虛雖有實邪固結敢用剛猛峻劑攻擊之乎故仲景又立附子瀉心湯用芩連佐大黃以法膈上之熱痞即兼附子之溫以散之大黃附子湯用細辛佐附子以攻脅下寒結即兼大黃之寒以導之寒熱合用溫攻並施此聖法昭然不可思議者也越鞠湯丸治一切濕痰食火氣血諸郁香附蒼朮撫芎神麯山梔仁水煎服或作丸注夫人以氣為本氣和則上下不失其度運行不停其機病從何生若飲食不節寒溫不適喜怒無常憂思元度使沖和之氣升降失常以致胃郁不思飲食脾郁不消水穀氣鬱胸腹脹滿血鬱胸膈刺痛濕鬱痰飲火鬱為熱及嘔吐噁心吞酸吐酸嘈雜噯氣百病叢生故用香附以開氣鬱蒼朮以除濕鬱撫芎以行血鬱山梔以清火鬱神麯以消食鬱此朱震亨因五郁之法而變通者也五藥相須共收五郁之效然當問何郁病甚便當以何藥為主至若氣虛加人參氣痛加木香郁甚加鬱金懶食加谷糵脹加厚朴痞加枳實嘔痰加薑夏火盛加萸連則又存乎臨證者之詳審也四磨飲治七情感傷上氣喘急胸膈不快妨悶不食人參檳榔沉香天台烏藥上四味各濃磨水取七分煎三五沸放溫空心服集注王又原曰經云聖人嗇氣如持至寶庸人役物而反傷太和此七情隨所感皆能為病然壯者氣行而愈弱者氣著為病愚者不察一遇上氣喘急滿悶不食謂是實者宜瀉輒投破耗等藥得藥非不暫快初投之而應投之久而不應矣夫呼出為陽吸入為陰肺陽清肅則氣下行腎陰寧謐則氣歸攝不復散而上逆矣若正氣既衰即欲削堅破滯則邪氣難伏法當用人參先補正氣沉香納之於腎而後以檳榔烏藥從而導之所謂實必顧虛瀉必先補也四品氣味俱厚磨則取其氣味俱足煎則取其氣味純和氣味齊到效如桴鼓矣備急丸治寒氣冷食稽留胃中心腹滿痛大便不通者大黃二兩乾薑二兩巴豆去皮研如脂一兩先搗大黃乾薑為末內巴豆合搗千杵和蜜丸如豆大藏密器中勿泄氣候用每服三四丸暖水或酒下金匱主中惡心腹脹滿卒痛如錐刺氣急口噤如卒死者捧頭起灌令下咽須臾當差不差更與三丸當腹中鳴即吐利便差若口噤者須化開從鼻孔用葦管吹入自下於咽集注柯琴曰大便不通當分陽結陰結陽結有承氣更衣之劑陰結又製備急白散之方金匱用此治中惡當知寒邪卒中者宜之若用於溫暑熱邪速其死矣是方允為陰結者立乾薑散中焦寒邪巴豆逐腸胃冷積大黃通地道又能解巴豆毒是有制之師也然白散治寒結在胸故用桔梗佐巴豆用吐下兩解法此則治寒結腸胃故用大黃佐薑巴以直攻其寒世徒知有溫補之法而不知有溫下之法所以但講寒虛不議及寒實也按世人之情惟知畏貧不知畏禍因其貧遺其禍病人之情亦多如是惟知畏虛不知畏病因其虛忘其病殊不知虛猶貧也病猶禍也虛而有病猶夫貧者有禍也去其禍而但貧猶可安也實而有病猶夫富者有禍也不去其禍而其富未可保也最可笑者近世之醫臨診病家外飭小心中存不決且諉言虛不可攻縱使病去正氣難復病人畏懼自然樂從受病淺者幸而自愈設不愈者另延醫至詎病者先意難入攻病之藥尚未入口衆議咻咻致明通之士拂袖而去坐而待斃終不悟為庸工之所誤也醫者久擅其術初心原為自全恬不知恥久之亦競以為養病為能攻病為拙而舉世之病者皆昧昧於治病也嘗考孫思邈以仲景麻黃桂杏甘草之還魂湯治卒中昏冒口噤握固李杲以仲景巴豆大黃乾薑之備急丸治卒中暴死腹痛滿閉下咽立效豈二人不知虛實耶蓋上工之醫未診病時並不先存意見亦不生心自全有是病但用是藥耳柯琴曰備急丸治寒結腸胃白散治寒結在胸於此又可知還魂湯治寒結在胸之表以散無形之邪氣也白散治寒結在胸之裡以攻有形之痰飲也備急丸治寒結在腸胃以攻不化之糟粕也磁朱丸治神水寬大漸散昏如霧露中行漸睹空中有黑花睹物成二體及內障神水淡緑色淡白色又治耳鳴及聾磁石二兩辰砂一兩神麯生三兩更以一兩水和作餅煮浮入前藥煉蜜為丸每服十丸加至三十丸空心米湯下集注王又原曰五臟六腑之精皆上注於目則目之能視者氣也目之所以能視者精也腎為藏精故神水發於腎心為離照故神光發於心光發陽而外映有陰精以為守則不散而常明水發陰而凝靜有陽氣以為布則洞悉而不窮惟心腎有虧致神水乾涸神光短少昏眊內障諸證所由作也磁石直入腎經收散失之神性能引鐵吸肺金之氣歸藏腎水硃砂體陽而性陰能納浮游之火而安神明水能鑑火能燭水火相濟而光華不四射歟然目受臟腑之精精神於谷神麯能消化五穀則精易成矣蓋神水散大緩則不收賴鎮墜之品疾收而吸引之故為救急之劑也其治耳鳴耳聾等證亦以鎮墜之功能治虛陽之奔耳柯琴曰此丸治癲癰之聖劑蓋狂癡是心腎脾三臟之病心藏神脾藏意與智腎藏精與志心者神明之主也主不明則十二官危使道閉塞而不通形乃大傷即此謂也然主何以不明也心法離而屬火真水藏其中若天一之真水不足地二之虛火妄行所謂天氣者蔽塞地氣者冒明日月明邪害空竅故目多妄見而作此奇疾也作金石之重劑以鎮之狂必不止硃砂稟南方之赤色入通於心能降無根之火而安神明磁石稟北方之黑色入通於腎吸肺金之氣以生精墜炎上之火以定志二石體重而主降性寒而涼陰志同道合奏功可立俟矣神麯推陳至新上交心神下達腎志以生意智且食入於陰長氣於陽奪其食則已此內經治狂法也食消則意智明而精神治是用神麯之旨乎煉蜜和丸又甘以緩之矣石斛夜光丸治神水寬大漸散昏如霧露空中有黑花及睹物成二神水淡緑淡白色者天門冬二兩菟絲子七錢人參二兩茯苓二兩甘菊花七錢乾山藥七錢麥冬一兩熟地一兩肉蓯蓉五錢青葙子五錢生地一兩枸杞七錢羚羊角鎊五錢草決明八錢石斛七錢杏仁七錢蒺藜五錢川芎五錢甘草炙五錢黃連五錢防風五錢枳殼五錢烏犀鎊五錢牛膝七錢五分上為細末煉蜜丸桐子大每服三五十丸溫酒鹽湯下集注羅謙甫曰此方為陽衰陰弱不能升精於目而設故目科與千金磁朱丸並重治證亦同然磁朱為鎮墜藥此為羡補藥針經曰五臟六腑精氣皆上於目而為之精故夫目之精明者陰陽合傳而為精明者也若腎肝虛則陰弱不能斂精以升養神水於內脾肺虛則陽衰不能攝陰而浮散神光於外以致神水寬大睹物成二此其治法其營在肝其主在腎其合在脾能合腎脾之陰而使肝達之則必能歸精於兩眸而繼明如晝夜矣是方先補腎肝以二冬二地菟絲枸杞五味牛膝蓯蓉群隊滋陰之品以之強陰填精斂氣安神養血此壯水之主亦所以生水也復以人參炙草茯苓山藥培補中宮使調合陰陽也佐之以蒺藜甘菊川芎枳殼防風行肝達氣青葙決明子解結散滯黃連烏犀羚角清火瀉熱然必取石斛之妙合脾腎者清而行之要使升精歸明之用臟腑合德專精緻一耳其以為丸者補上治下利以緩利以久不利以速也洗刀散治風熱上攻火眼赤痛驟生雲翳外障遮睛防風一錢石膏一錢滑石一錢歸尾一錢赤芍八分羌活八分荊芥五分黃芩五分連翹五分川芎五分桔梗五分麻黃五分白朮五分大黃五分芒硝五分獨活五分元參五分木賊五分菊花五分白蒺藜五分蟬蛻五分草決明五分薄荷四分梔子四分蔓荊子四分細辛三分甘草三分加清茶葉五分水煎服注目之病內障者昏暗不明而不腫痛得之於內七情動中勞傷心腎也外障者赤腫而痛睛不昏暗得之於六淫所襲熱蘊經絡也故內障多虛外障多實子和曰眼無火不病非止內障正指外障而立言也外障赤腫而痛者或散外邪或瀉內熱或並解之可立愈也其有風火上攻留而不散凝結雲翳掩其光明者又非或散或下所能即愈也洗刀散方既可以攻風熱又可以去雲翳是一方而兼擅其長也方中用防風通聖散全劑是主以去風熱也倍歸尾赤芍是治風先治血血行風自滅也加羌獨活蔓荊子倍防風是祛風而專在太陽表也太陽之裡少陰也故又加細辛直走少陰加元參下安腎火是治表而顧及其里也其加木賊蟬蛻草決明白蒺藜菊花者是佐諸祛風清熱之群藥以消風熱驟壅之雲翳也失笑散治産後心腹絞痛欲死或血迷心竅不省人事五靈脂蒲黃等分每服三錢酒煎服獨聖散南山楂肉炒一兩水煎用童便沙糖和服集注吳於宣曰經云心主血脾統血肝藏血故産後瘀血停滯三經皆受其病以致心腹瘀痛惡寒發熱神迷眩運胞膈滿悶凡茲者由寒凝不消散氣滯不流行惡露停留小腹結痛迷悶欲絶非純用甘溫破血行血之劑不能攻逐蕩平也是方用靈脂之甘溫走肝生用則行血蒲黃辛平入肝生用則破血佐酒煎以行其力庶可直抉厥陰之滯而有推陳致新之功甘不傷脾辛能散瘀不覺諸證悉除直可以一笑而置之矣至獨聖散用山楂一味濃煎與沙糖童便同服者何也山楂不惟消食健脾功能破瘀止兒枕痛更益以沙糖之甘逐惡而不傷脾童便之咸人胞而不涼下相得相須功力甚偉名之曰獨聖誠不虛也大黃䗪蟲丸治五勞七傷內有乾血肌膚甲錯兩目黯黑大黃酒蒸十兩桃仁去皮尖炒四兩杏仁去皮尖炒四兩黃芩炒二兩甘草三兩芍藥炒四兩地黃十兩乾漆炒一兩虻蟲去翅足炒一兩五錢水蛭炙黃百枚蠐螬炒一兩五錢䗪蟲去頭足炒一兩上十二味為末蜜丸如小豆大酒服五丸日三服集注李中梓曰勞傷之證肌膚甲錯兩目黯黑此內有瘀血者也瘀之日久則必發熱熱涸其液則血乾於經隧之間愈干愈熱愈熱愈干而新血皆損人之充養百骸光華潤澤者止藉此血血傷則無以沃其膚故甲錯也目得血而能視血枯則無以榮其目故黯黑也仲景洞見此證補之不可涼之無益而立此方經曰血主濡之故以地黃為君堅者削之故以大黃為臣統血者脾也脾欲緩急食甘以緩之又酸苦湧泄為陰故以甘芍桃仁為佐咸走血苦勝血故以乾漆之苦四蟲之咸為使夫濁陰不降則清陽不升瘀血不去則新血不生今人遇一勞證便用滋陰之藥服而不效坐以待斃術豈止此耶仙方活命飲附薛己治瘍通方治一切瘡瘍未成膿者內消已成膿者即潰又止痛消毒之聖藥也穿山甲白芷防風皂角制乳香沒藥當歸尾赤芍花粉貝母陳皮金銀花甘草上十三味用酒一碗煎數沸服集注羅謙甫曰此瘍門開手攻毒之第一方也經云營氣不從逆於肉理故癰疽之發未有不從營氣之鬱滯因而血結痰滯蘊崇熱毒為患治之之法妙在通經之結行血之滯佐之以豁痰理氣解毒是方穿山甲以攻堅皂刺以達毒所白芷防風陳皮通經理氣而疏其滯乳香定痛和血沒藥破血散結赤芍歸尾以驅血熱而行之以破其結佐以貝母金銀花甘草一以豁痰解鬱一以散毒和血其為潰堅止痛宜矣然是方為營衛尚強中氣不虧者設若脾胃素弱營衛不調則有托裡消毒散之法必須斟酌而用此薛己所論千古不易之治也因附治瘍用方之法於後使學者服膺云薛己曰治瘍之法若腫高焮痛者先用仙方活命飲解之後用托裡敗毒散漫腫微痛者用托裡散如不應加薑桂若膿出而反痛氣血虛也八珍散不作膿不腐潰陽氣虛也四君加歸耆肉桂不生肌不收斂脾氣虛也四君加芍藥木香惡寒僧寒陽氣虛也十全大補加薑桂晡熱內熱陰血虛也四物加參耆欲嘔作嘔胃氣虛也六君加炮姜自汗盜汗五臟虛也六味九料加五味子食少體倦脾氣虛也補中益氣加茯苓半夏喘促咳嗽脾肺虛也前湯加麥冬五味欲嘔少食脾胃虛也人參理中湯腹痛泄瀉脾胃虛寒也附子理中湯熱渴淋祕腎虛陰火也加減八味丸大凡怯弱之人不必分其腫潰惟當先補胃氣蓋瘡瘍之作緣陰陽虧損其膿既泄氣血愈虛豈有不宜補者哉或疑參耆滿中間有用者又加發散敗毒所補不償所損又或以有疾不服補劑因而致誤者多矣可勝惜哉托裡消毒散人參黃耆白朮茯苓當歸川芎白芍金銀花白芷甘草連翹水煎服注參耆朮苓草以益氣分歸芎芍以滋血分銀花白芷連翹以解毒
